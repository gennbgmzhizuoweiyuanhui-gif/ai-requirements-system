<!DOCTYPE html>
<!-- AI要件定義システム：現場の曖昧な発話を要件定義書に変換するWebアプリ -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI要件定義システム</title>
  <style>
    /* ===== CSS カスタムプロパティ（テーマカラーを一元管理）===== */
    :root {
      --bg-base:      #ffffff;                                        /* ページ背景（白）*/
      --bg-card:      rgba(255, 255, 255, 0.8);                       /* カード背景（白半透明グラスモーフィズム）*/
      --cyan:         #82ff03;                                        /* アクセント：ライムグリーン */
      --blue:         #0100be;                                        /* プライマリ：深いブルー */
      --grad:         linear-gradient(135deg, #0100be, #82ff03);      /* メイングラデーション */
      --text:         #0a0a0a;                                        /* 主要テキスト */
      --text-sub:     #4a5568;                                        /* サブテキスト */
      --border:       rgba(1, 0, 190, 0.14);                          /* 枠線 */
      --glow-near:    rgba(130, 255, 3, 0.30);                        /* 近距離グロー（ライム）*/
      --glow-far:     rgba(130, 255, 3, 0.10);                        /* 遠距離グロー */
    }

    /* ===== 全体リセット ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== ページ全体：ホワイトベース＋淡い光源グラデーション ===== */
    body {
      font-family: 'Meiryo', 'メイリオ', 'Hiragino Sans', sans-serif;
      font-size: 16px;
      background-color: var(--bg-base);
      /* ブルーとライムの淡いグラデーションで奥行き感を演出する */
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(1,0,190,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(130,255,3,0.06) 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー：#0100beベースのグラデーション＋sticky ===== */
    header {
      background: linear-gradient(135deg, #0100be 0%, #0a0099 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 2px solid #82ff03;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky; /* スクロールしてもヘッダーを固定する */
      top: 0;
      z-index: 100;
    }

    /* ===== タイトル：白文字（#0100be背景上なので可読性問題なし）===== */
    header h1 {
      font-size: 18px;
      flex: 1;
      color: white;
      letter-spacing: 0.5px;
    }

    /* ===== APIキーラベル ===== */
    #api-key-label {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      white-space: nowrap;
    }

    /* ===== APIキー入力欄 ===== */
    #api-key-input {
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 8px;
      font-size: 13px;
      width: 260px;
      background: rgba(255,255,255,0.15);
      color: white;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #api-key-input::placeholder { color: rgba(255,255,255,0.5); }

    #api-key-input:focus {
      outline: none;
      border-color: #82ff03;
      box-shadow: 0 0 0 2px rgba(130,255,3,0.30);
    }

    /* ===== メインコンテンツエリア ===== */
    main {
      max-width: 1100px; /* 2カラムレイアウト時に十分な幅を確保する */
      margin: 40px auto;
      padding: 0 16px;
    }

    /* ===== グラスモーフィズムカード（白半透明）===== */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
      box-shadow:
        0 4px 24px rgba(1,0,190,0.08),
        0 1px 4px rgba(1,0,190,0.04),
        inset 0 1px 0 rgba(255,255,255,0.9); /* 上端の白い光沢ライン */
    }

    /* 入力カードは CSS アニメーションでフェードインする */
    #input-card {
      animation: cardAppear 0.8s ease forwards;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== セクションタイトル：#0100beで白背景でも読みやすく ===== */
    .section-title {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #0100be;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    /* セクションタイトル下のグラデーションラインアクセント */
    .section-title::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 48px;
      height: 2px;
      background: var(--grad);
      border-radius: 2px;
    }

    /* ===== テキストエリア共通スタイル ===== */
    #input-textarea, #answer-textarea {
      width: 100%;
      padding: 16px;
      background: rgba(1,0,190,0.02);
      border: 1px solid rgba(1,0,190,0.18);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      line-height: 1.7;
      color: var(--text);
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
    }

    #input-textarea  { height: 160px; }
    #answer-textarea { height: 200px; }

    /* プレースホルダーの色：#0100beで落ち着いたブルー */
    #input-textarea::placeholder, #answer-textarea::placeholder {
      color: rgba(1, 0, 190, 0.35);
    }

    /* ===== フォーカス時：#82ff03のグローエフェクト ===== */
    #input-textarea:focus, #answer-textarea:focus {
      outline: none;
      border-color: #82ff03;
      box-shadow:
        0 0 0 1px rgba(130,255,3,0.40),   /* 内側リング */
        0 0 20px var(--glow-near),          /* 近距離グロー */
        0 0 55px var(--glow-far);           /* 遠距離グロー */
    }

    /* ===== 文字数カウンター ===== */
    #char-count, #answer-char-count {
      display: inline-block;
      width: 100%;
      text-align: right;
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 6px;
      transition: color 0.25s ease, transform 0.15s ease;
    }

    /* 文字数変化時のバウンスアニメーション用クラス（JS で付与・解除）*/
    .count-bump {
      color: #0100be !important;
      transform: scale(1.12);
    }

    /* ===== ボタン共通スタイル ===== */
    .btn {
      padding: 13px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      position: relative;  /* リップルエフェクト用 */
      overflow: hidden;    /* リップルがはみ出ないように */
      transition: transform 0.2s ease, box-shadow 0.3s ease, opacity 0.4s ease;
    }

    /* ===== ヒアリングボタン・生成ボタン共通：#0100be ===== */
    #hearing-btn, #generate-btn {
      background: #0100be;
      color: white;
      width: 100%;
      margin-top: 20px;
      font-size: 15px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(1,0,190,0.30);
    }

    /* ホバー時：浮き上がり＋#82ff03のグローエフェクト */
    #hearing-btn:not(:disabled):hover, #generate-btn:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(130,255,3,0.55);
      animation: btnPulse 2s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(1,0,190,0.30); }
      50%       { box-shadow: 0 4px 36px rgba(130,255,3,0.65), 0 0 70px rgba(130,255,3,0.20); }
    }

    /* 非活性状態 */
    #hearing-btn:disabled, #generate-btn:disabled {
      background: rgba(0,0,0,0.08);
      color: var(--text-sub);
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      animation: none !important;
    }

    /* ===== 「要件定義書を生成する」ボタン：初期は非表示でスライドアップ演出 ===== */
    #generate-btn {
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none; /* 非表示中はクリック不可 */
    }

    /* JS で付与するクラス：スライドアップして出現する */
    #generate-btn.slide-up {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* 非活性時は slide-up の transform を上書きする */
    #generate-btn.slide-up:disabled {
      transform: none !important;
    }

    /* ===== リップルエフェクト（波紋）：#82ff03 ===== */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(130,255,3,0.55);
      width: 10px;
      height: 10px;
      margin-left: -5px;  /* クリック座標を中心にするための補正 */
      margin-top:  -5px;
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to { transform: scale(28); opacity: 0; }
    }

    /* ===== 音声入力ボタン ===== */
    #voice-btn {
      background: rgba(1,0,190,0.06);
      border: 1px solid rgba(1,0,190,0.22);
      color: #0100be;
    }

    /* 録音中：赤いパルスアニメーション */
    #voice-btn.recording {
      background: rgba(229,62,62,0.12);
      border-color: rgba(229,62,62,0.45);
      color: #fc8181;
      animation: recordPulse 1s ease-in-out infinite;
    }

    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(229,62,62,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(229,62,62,0);   }
    }

    /* ===== 音声ステータステキスト ===== */
    #voice-status { font-size: 13px; color: var(--text-sub); }

    /* ===== ドットウェーブローディング（スピナー代替）===== */
    #loading-area, #question-loading-area {
      display: none;
      text-align: center;
      padding: 32px 0;
      color: var(--text-sub);
      font-size: 14px;
    }

    /* 5つのドットが波打つコンテナ */
    .dot-wave {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }

    /* 各ドット：#0100beと#82ff03を交互に配色して波打ちアニメーションをずらす */
    .dot-wave span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: dotWave 1.4s ease-in-out infinite;
    }

    /* 奇数ドット：ブルー */
    .dot-wave span:nth-child(odd)  { background: #0100be; }
    /* 偶数ドット：ライムグリーン */
    .dot-wave span:nth-child(even) { background: #82ff03; }

    .dot-wave span:nth-child(1) { animation-delay: 0s;    }
    .dot-wave span:nth-child(2) { animation-delay: 0.18s; }
    .dot-wave span:nth-child(3) { animation-delay: 0.36s; }
    .dot-wave span:nth-child(4) { animation-delay: 0.54s; }
    .dot-wave span:nth-child(5) { animation-delay: 0.72s; }

    @keyframes dotWave {
      0%, 60%, 100% { transform: translateY(0)    scale(0.8); opacity: 0.35; }
      30%            { transform: translateY(-12px) scale(1.1); opacity: 1;    }
    }

    /* ===== エラーエリア ===== */
    #error-area, #question-error-area {
      display: none;
      background: rgba(229,62,62,0.08);
      border: 1px solid rgba(229,62,62,0.25);
      border-radius: 10px;
      padding: 16px;
      color: #fc8181;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== 質問カードのコンテナ ===== */
    #question-content { margin-bottom: 4px; }

    /* ===== 質問個別アイテム（staggered アニメーション）===== */
    .question-item {
      position: relative;              /* ::before グラデーションバーの基準 */
      background: rgba(1,0,190,0.03);
      border: 1px solid rgba(1,0,190,0.10);
      border-radius: 12px;
      padding: 15px 18px 15px 22px;   /* 左にグラデーションバー分の余白 */
      margin-bottom: 10px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      /* 初期状態：上から降りてくるフェードイン前 */
      opacity: 0;
      transform: translateY(-14px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    /* JS の setTimeout で付与するクラス：スライドインして表示される */
    .question-item.slide-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* 左端のグラデーションラインバー */
    .question-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: var(--grad);
      border-radius: 3px;
    }

    /* ===== 質問ごとの個別回答テキストエリア ===== */
    .answer-input {
      width: 100%;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(1,0,190,0.16);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      line-height: 1.65;
      color: var(--text);
      min-height: 60px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .answer-input::placeholder { color: rgba(1,0,190,0.28); }

    /* フォーカス時：#82ff03のグロー */
    .answer-input:focus {
      outline: none;
      border-color: #82ff03;
      box-shadow:
        0 0 0 1px rgba(130,255,3,0.38),
        0 0 14px rgba(130,255,3,0.20);
    }

    /* 番号バッジ（グラデーション円形）*/
    .question-number {
      min-width: 26px;
      height: 26px;
      background: var(--grad);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: white;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* 質問本文 */
    .question-text {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
    }

    /* ===== 回答セクションの小ラベル ===== */
    .answer-section-label {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin: 24px 0 10px;
    }

    /* ===== セクション間のグラデーション区切りライン：#82ff03 ===== */
    .gradient-divider {
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(130,255,3,0.50) 30%,
        rgba(1,0,190,0.20) 70%,
        transparent
      );
      margin: 0 0 28px;
    }

    /* ===== 出力エリアのヘッダー ===== */
    #output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ===== コピーボタン ===== */
    #copy-btn {
      background: rgba(1,0,190,0.07);
      color: #0100be;
      border: 1px solid rgba(1,0,190,0.22);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    #copy-btn:hover  { background: rgba(1,0,190,0.13); box-shadow: 0 0 10px rgba(130,255,3,0.35); }
    #copy-btn.copied { background: rgba(130,255,3,0.18); color: #0a6600; border-color: rgba(130,255,3,0.45); }

    /* ===== 編集ボタン ===== */
    #edit-btn {
      background: rgba(74,85,104,0.07);
      color: var(--text-sub);
      border: 1px solid rgba(74,85,104,0.16);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    #edit-btn:hover { background: rgba(1,0,190,0.08); color: #0100be; border-color: rgba(1,0,190,0.25); }

    /* ===== 編集完了ボタン ===== */
    #edit-done-btn {
      background: rgba(1,0,190,0.07);
      color: #0100be;
      border: 1px solid rgba(1,0,190,0.22);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #edit-done-btn:hover { background: rgba(1,0,190,0.13); }

    /* ===== 編集ヒントテキスト ===== */
    #edit-hint {
      font-size: 12px;
      color: rgba(1,0,190,0.38);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
      user-select: none; /* ヒントテキスト自体は選択不可 */
    }

    /* ===== エクスポートボタン（Word / Excel）===== */
    #word-export-btn {
      background: #0100be;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    #word-export-btn:hover { opacity: 0.85; box-shadow: 0 2px 10px rgba(1,0,190,0.35); }

    #excel-export-btn {
      background: #1a7a1a;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    #excel-export-btn:hover { opacity: 0.85; box-shadow: 0 2px 10px rgba(26,122,26,0.35); }

    /* ===== 出力コンテンツのMarkdownスタイル ===== */
    #output-content {
      line-height: 1.9;
      font-size: 15px;
      color: var(--text);
      border-radius: 10px;
      padding: 6px;
      outline: none;
      transition: box-shadow 0.3s ease;
    }

    /* 常時編集可能：フォーカス時に#82ff03のグローエフェクトで光る */
    #output-content:focus {
      box-shadow:
        0 0 0 1px rgba(130,255,3,0.50),
        0 0 18px rgba(130,255,3,0.22);
    }

    /* 見出し1（# ）→ <h2>：#0100be文字＋#82ff03アンダーラインでメリハリをつける ===== */
    #output-content h2 {
      font-size: 18px;
      font-weight: bold;
      color: #0100be;
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #82ff03;
    }

    /* 見出し2（## ）→ <h3> */
    #output-content h3 {
      font-size: 15px;
      font-weight: bold;
      color: #0100be;
      margin: 18px 0 8px;
    }

    /* 見出し3（### ）→ <h4> */
    #output-content h4 {
      font-size: 14px;
      font-weight: bold;
      color: var(--text-sub);
      margin: 12px 0 6px;
    }

    #output-content ul, #output-content ol {
      padding-left: 24px;
      margin: 8px 0;
    }

    #output-content li       { margin-bottom: 6px; line-height: 1.75; }
    #output-content strong   { color: #0100be; font-weight: bold; }

    #output-content hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(130,255,3,0.50), transparent);
      margin: 20px 0;
    }

    #output-content p { margin: 8px 0; }

    /* ===== スクロールフェードイン（IntersectionObserver）===== */
    .scroll-fade {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .scroll-fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============================================================
       2カラムレイアウト（要件定義書 + チャットサイドバー）
       ============================================================ */

    /* 外側ラッパー：flexで左70%・右30%に分割する */
    #output-area {
      display: none; /* 要件定義書生成後にJS で flex に切り替える */
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    /* 左カラム（70%）：要件定義書カード */
    #output-col {
      flex: 0 0 calc(70% - 12px);
      min-width: 0; /* flexアイテムのオーバーフローを防ぐ */
    }

    #output-col .card { margin-bottom: 0; }

    /* 右カラム（30%）：チャットサイドバー */
    #chat-sidebar {
      flex: 0 0 calc(30% - 12px);
      background: #f8f8ff;
      border: 1px solid rgba(1,0,190,0.12);
      border-left: 3px solid #0100be;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 100px); /* スクロールせずに画面内に収める */
      position: sticky;
      top: 76px; /* ヘッダーの高さ分だけ下にずらす */
      box-shadow: 0 4px 24px rgba(1,0,190,0.08);
      overflow: hidden;
    }

    /* チャットヘッダー */
    .chat-header {
      background: #0100be;
      color: white;
      padding: 14px 18px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    /* メッセージ表示エリア（スクロール可能）*/
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* スクロールバーをシンプルにする */
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(1,0,190,0.20); border-radius: 4px; }

    /* 吹き出し共通スタイル */
    .chat-message {
      max-width: 88%;
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.65;
      animation: msgFadeIn 0.35s ease forwards;

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(7px); }

    }

    /* AIのメッセージ：左寄せ・薄いブルー背景 */
    .chat-message.ai {
      background: rgba(1,0,190,0.06);
      color: #0a0a0a;
      align-self: flex-start;
      border-bottom-left-radius: 3px;

    /* ユーザーのメッセージ：右寄せ・#0100be背景・白文字 */
    .chat-message.user {
      background: #0100be;
      color: white;
      align-self: flex-end;

    }

    /* ローディング吹き出し（ドットウェーブ）*/
    .chat-message.loading {

    .chat-message.loading .dot-wave { margin: 4px 0 2px; gap: 6px; }
    .chat-message.loading .dot-wave span { width: 7px; height: 7px; }

    /* チャット入力エリア（下部固定）*/
    .chat-input-area {

    /* チャット入力テキストエリア */

    /* 送信ボタン：#82ff03アクセント */

    /* ===== レスポンシブ：768px以下で縦積みレイアウトに切り替える ===== */
    @media (max-width: 768px) {
      #output-area { flex-direction: column !important; }

        width: 100%;
        max-height: 400px;

      text-align: center;

      letter-spacing: 1px;
    }
  </style>
</head>

    <!-- ===== STEP 3：2カラムレイアウト（要件定義書＋チャットサイドバー）===== -->
    <div id="output-area">

      <!-- 左カラム（70%）：要件定義書カード -->

          <!-- 出力ヘッダー（タイトル＋エクスポート・コピーボタン）-->

            </div>

      <!-- 右カラム（30%）：AIチャットサイドバー -->
      <div id="chat-sidebar">
        <!-- サイドバーヘッダー -->
        <div class="chat-header">🤖 AI修正アシスタント</div>
        <!-- チャット履歴エリア（メッセージが動的に追加される）-->

        <!-- チャット入力エリア（下部固定）-->
        <div class="chat-input-area">
          <textarea
            id="chat-input"
            placeholder="修正指示を入力してください...&#10;（Shift+Enterで改行、Enterで送信）"
          ></textarea>
          <button id="chat-send-btn">送信</button>
        </div>
      </div>

    </div><!-- /#output-area -->

  </main>

  <!-- フッター -->
  <footer>
    AI要件定義システム &copy; 2026 &nbsp;|&nbsp; Powered by Claude API
  </footer>

  <script>
    // ===== DOMが読み込まれた後に初期化処理を実行する =====
    document.addEventListener('DOMContentLoaded', function() {

      // ===== 要素参照の取得 =====
      var apiKeyInput = document.getElementById('api-key-input');
      var textarea    = document.getElementById('input-textarea');
      var charCount   = document.getElementById('char-count');
      var hearingBtn  = document.getElementById('hearing-btn');
      var generateBtn = document.getElementById('generate-btn');

      // ===== APIキーの localStorage 復元・保存 =====
      var savedKey = localStorage.getItem('claude_api_key');
      if (savedKey) apiKeyInput.value = savedKey;
      apiKeyInput.addEventListener('input', function() {
        localStorage.setItem('claude_api_key', apiKeyInput.value);
      });

      // ===== プロキシサーバーのエンドポイント =====
      var API_URL = 'http://localhost:3001/api/claude';

      // ===== STEP 1/2 の取得情報を保持する変数 =====
      var savedInitialRequest     = '';
      var savedQuestionsText      = '';
      var originalHearingBtnText  = hearingBtn.textContent.trim();
      var originalGenerateBtnText = generateBtn.textContent.trim();

      // ============================================================
      // ① タイピングアニメーション（プレースホルダーを順番に表示）
      // ============================================================
      var placeholderTexts = [
        '現場の進捗管理をもっと楽にしたい。今は紙の日報を使っているが、スマホで写真を撮って報告できるようにしたい。',
        '図面の最新版管理が大変。現場と事務所で別々のバージョンを持ってしまい、認識のズレが起きている。',
        '安全パトロールの記録をデジタル化したい。今は手書きで記録しているが、集計に時間がかかっている。',
        '工事の工程表をリアルタイムで共有したい。今はExcelで管理していて、更新のたびにメールで送っている。',
      ];
      var phIdx     = 0;      // 現在表示中のサンプルインデックス
      var phChar    = 0;      // 現在何文字目まで表示しているか
      var phTimer   = null;   // setTimeout の ID（クリアに使う）
      var phErasing = false;  // 消去中かどうか

      // 1文字ずつ表示するタイピング処理
      function typePlaceholder() {
        var target = placeholderTexts[phIdx];
        if (!phErasing) {
          // タイピング：1文字ずつ追加する
          phChar++;
          textarea.placeholder = target.slice(0, phChar) + '|'; // カーソル記号を末尾に付ける
          if (phChar >= target.length) {
            // 全文表示したら2.5秒待って消去フェーズへ
            phTimer = setTimeout(function() { phErasing = true; typePlaceholder(); }, 2500);
          } else {
            phTimer = setTimeout(typePlaceholder, 55); // 1文字あたり55ms
          }
        } else {
          // 消去：1文字ずつ削除する
          phChar--;
          textarea.placeholder = target.slice(0, phChar) + (phChar > 0 ? '|' : '');
          if (phChar <= 0) {
            // 全消去したら次のサンプルへ
            phErasing = false;
            phIdx     = (phIdx + 1) % placeholderTexts.length;
            phTimer   = setTimeout(typePlaceholder, 400); // 次の文の前に少し間を置く
          } else {
            phTimer = setTimeout(typePlaceholder, 30); // 消去はタイピングより少し速め
          }
        }
      }

      // ユーザーがフォーカスしたらアニメーションを止めてプレースホルダーをクリアする
      textarea.addEventListener('focus', function() {
        clearTimeout(phTimer);
        textarea.placeholder = '';
      });
      // フォーカスが外れて入力がなければアニメーションを再開する
      textarea.addEventListener('blur', function() {
        if (!textarea.value) {
          phChar = 0; phErasing = false;
          phTimer = setTimeout(typePlaceholder, 600);
        }
      });

      // ページロード後に少し遅らせてアニメーション開始する
      phTimer = setTimeout(typePlaceholder, 1000);

      // ============================================================
      // ② 文字数カウンター（バウンスアニメーション付き）
      // ============================================================
      // 文字数表示＋バウンスアニメーションを実行するヘルパー関数
      function updateCharCount(el, count) {
        el.textContent = count + ' 文字';
        el.classList.add('count-bump');                              // バウンスクラスを付与する
        setTimeout(function() { el.classList.remove('count-bump'); }, 200); // 200ms後に解除する
      }

      textarea.addEventListener('input', function() {
        updateCharCount(charCount, textarea.value.length);
      });

      // ============================================================
      // ③ リップルエフェクト（ボタン押下時の波紋）
      // ============================================================
      function addRipple(btn, clientX, clientY) {
        var rect   = btn.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.classList.add('ripple');
        ripple.style.left = (clientX - rect.left) + 'px';
        ripple.style.top  = (clientY - rect.top)  + 'px';
        btn.appendChild(ripple);
        // アニメーション終了後（560ms）に要素を削除する
        setTimeout(function() { ripple.remove(); }, 600);
      }

      // リップルを適用するボタンにイベントを登録する
      [hearingBtn, generateBtn].forEach(function(btn) {
        btn.addEventListener('mousedown', function(e) {
          addRipple(btn, e.clientX, e.clientY);
        });
        btn.addEventListener('touchstart', function(e) {
          if (e.touches[0]) addRipple(btn, e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
      });

      // ============================================================
      // ④ IntersectionObserver（スクロール時フェードイン）
      // ============================================================
      var scrollObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');   // フェードインを開始する
            scrollObserver.unobserve(entry.target);  // 一度表示したら監視を解除する
          }
        });
      }, { threshold: 0.1 });

      // .scroll-fade クラスを持つ要素を監視対象に登録する
      document.querySelectorAll('.scroll-fade').forEach(function(el) {
        scrollObserver.observe(el);
      });

      // ============================================================
      // ⑤ Claude API 共通呼び出し関数
      // ============================================================
      async function callClaudeApi(apiKey, systemPrompt, userMessage) {
        var requestBody = {
          model:      'claude-sonnet-4-20250514', // 使用するモデル
          max_tokens: 4000,                        // 最大生成トークン数
          system:     systemPrompt,                // システムプロンプト
          messages:   [{ role: 'user', content: userMessage }]
        };

        var response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json', // JSONを送ることを宣言
            'x-api-key':    apiKey              // APIキーをプロキシへ転送
          },
          body: JSON.stringify(requestBody)
        });

        // HTTPエラー（4xx/5xx）を日本語メッセージに変換する
        if (!response.ok) {
          var errorMsg = 'APIエラー（HTTP ' + response.status + '）\n';
          if (response.status === 401) {
            errorMsg += 'APIキーが無効です。正しいAPIキーを入力してください。';
          } else if (response.status === 429) {
            errorMsg += 'APIの利用制限に達しました。しばらく待ってから再試行してください。';
          } else if (response.status === 400) {
            errorMsg += 'リクエストの形式が不正です。入力内容を確認してください。';
          } else {
            try {
              var errorData = await response.json();
              errorMsg += (errorData.error && errorData.error.message)
                ? errorData.error.message : '不明なエラー';
            } catch (_) {
              errorMsg += 'サーバーからのレスポンスを解析できませんでした。';
            }
          }
          throw new Error(errorMsg);
        }

        var data = await response.json();
        // レスポンス構造を安全に確認する
        if (!data.content || !data.content[0] || !data.content[0].text) {
          throw new Error('APIから有効なレスポンスが返りませんでした。もう一度お試しください。');
        }
        return data.content[0].text; // 返答テキストを返す
      }

      // ============================================================
      // ⑥ エラーメッセージ表示（XSSセーフなDOM操作）
      // ============================================================
      function showError(errorArea, message) {
        errorArea.style.display = 'block';
        errorArea.textContent   = '';
        errorArea.appendChild(document.createTextNode('⚠️ ')); // プレフィックスをテキストノードで追加
        message.split('\n').forEach(function(line, i) {
          if (i > 0) errorArea.appendChild(document.createElement('br')); // 改行を<br>で挿入
          errorArea.appendChild(document.createTextNode(line)); // 各行をテキストノードで追加（HTML注入不可）
        });
      }

      // ============================================================
      // ⑦ STEP 1：ヒアリングボタンのクリック処理
      //    最初の要望を送りAIに確認質問を生成させる
      // ============================================================
      hearingBtn.addEventListener('click', async function() {

        // 音声入力中の場合は先に停止する（同時動作を防ぐ）
        if (typeof isRecording !== 'undefined' && isRecording && typeof recognition !== 'undefined') {
          recognition.stop();
        }

        // ===== 入力チェック =====
        var apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          alert('APIキーを入力してください。\nヘッダーの「Claude APIキー」欄に入力してください。');
          apiKeyInput.focus();
          return;
        }

        var inputText = textarea.value.trim();
        if (!inputText) {
          alert('まず現場の状況・要望を入力してください。');
          textarea.focus();
          return;
        }

        // ===== UI を「ヒアリング中」状態にする =====
        hearingBtn.disabled    = true;
        hearingBtn.textContent = '⏳ 質問を考えています...';
        document.getElementById('loading-area').style.display = 'block';
        var errorArea = document.getElementById('error-area');
        errorArea.style.display = 'none';
        errorArea.textContent   = '';
        // 以前の質問カード・出力エリアを非表示にする（やり直し対応）
        document.getElementById('question-card').style.display = 'none';
        document.getElementById('output-area').style.display   = 'none';

        try {
          // ===== AIに確認質問＋各質問への想定回答をJSON形式で生成させる =====
          var hearingSystemPrompt =
            'あなたはITシステムの要件定義の専門家です。\n' +
            '現場担当者から最初の要望を受け取りました。\n' +
            'より精確な要件定義書を作成するために、以下の観点から重要な情報を3〜5個の質問にまとめてください。\n\n' +
            '確認観点：\n' +
            '- As-Is（現状の課題・問題点・今はどうやっているか）\n' +
            '- To-Be（システム導入後に実現したい理想の状態）\n' +
            '- ステークホルダー（誰が使うか・何人くらいか・誰が承認するか）\n' +
            '- 制約条件（予算感・導入希望時期・既存システムとの連携・対応デバイス）\n' +
            '- 優先度（絶対に必要な機能 vs あれば嬉しい機能）\n\n' +
            '出力形式：\n' +
            '必ず以下のJSON形式のみで出力してください（前置き・後書き・コードブロック記号不要）。\n' +
            '{\n' +
            '  "questions": ["質問1", "質問2", ...],\n' +
            '  "defaultAnswers": ["想定回答1", "想定回答2", ...]\n' +
            '}\n\n' +
            '- questionsは3〜5個、各質問は現場の方が答えやすい平易な言葉で1〜2文\n' +
            '- defaultAnswersはquestionsと同じ数で、各質問への「現場担当者が答えそうな具体的な想定回答」を記述\n' +
            '- 想定回答は担当者が手直しの起点として使える実用的・具体的な内容にする\n' +
            '- 日本語で出力する';

          var responseText = await callClaudeApi(
            apiKey,
            hearingSystemPrompt,
            '以下の要望に対して、確認質問と各質問への想定回答をJSON形式で生成してください。\n\n' + inputText
          );

          // ===== JSON形式でパースする（フォールバックあり）=====
          var parsed;
          try {
            // レスポンス内の {...} 部分だけを抽出してパースする
            var jsonMatch = responseText.match(/\{[\s\S]*\}/);

        var inList = false, inOl = false;
        function closeLists() {
          if (inList) { out.push('</ul>'); inList = false; }
          if (inOl)   { out.push('</ol>'); inOl   = false; }
        }
        lines.forEach(function(line) {
          if      (line.startsWith('### ')) { closeLists(); out.push('<h3>' + escapeHtml(line.slice(4)) + '</h3>'); }
          else if (line.startsWith('## '))  { closeLists(); out.push('<h2>' + escapeHtml(line.slice(3)) + '</h2>'); }
          else if (line.startsWith('# '))   { closeLists(); out.push('<h1>' + escapeHtml(line.slice(2)) + '</h1>'); }
          else if (/^\d+\. /.test(line)) {
            if (inList) { out.push('</ul>'); inList = false; }
            if (!inOl)  { out.push('<ol>');  inOl   = true;  }
            out.push('<li>' + escapeHtml(line.replace(/^\d+\. /, '')) + '</li>');
          } else if (line.startsWith('- ') || line.startsWith('* ')) {
            if (inOl)    { out.push('</ol>'); inOl   = false; }
            if (!inList) { out.push('<ul>');  inList = true;  }
            out.push('<li>' + escapeHtml(line.slice(2)) + '</li>');
          } else if (line.trim() === '---') { closeLists(); out.push('<hr>'); }
          else if (line.trim() === '')       { closeLists(); }
          else { closeLists(); out.push('<p>' + escapeHtml(line) + '</p>'); }
        });
        closeLists();
        return out.join('\n');
      }

      // ===== Word（.doc）ダウンロード =====
      document.getElementById('word-export-btn').addEventListener('click', function() {
        var md = window.generatedMarkdown;
        if (!md) { alert('先に要件定義書を生成してください。'); return; }

        var bodyHtml = markdownToWordHtml(md);
        var wordDoc =
          '<html xmlns:o="urn:schemas-microsoft-com:office:office"' +
          '      xmlns:w="urn:schemas-microsoft-com:office:word"' +
          '      xmlns="http://www.w3.org/TR/REC-html40">' +
          '<head><meta charset="UTF-8"><style>' +
          'body{font-family:"MS Mincho","ＭＳ 明朝",serif;font-size:11pt;line-height:1.8;margin:2cm;}' +
          'h1{font-size:16pt;color:#0100be;border-bottom:2px solid #82ff03;padding-bottom:4pt;margin-top:18pt;}' +
          'h2{font-size:13pt;color:#0100be;margin-top:14pt;}' +
          'h3{font-size:11pt;color:#333;margin-top:10pt;}' +
          'ul,ol{margin-left:18pt;}li{margin-bottom:3pt;}p{margin:4pt 0;}' +
          'hr{border:none;border-top:1px solid #ccc;margin:8pt 0;}' +
          '</style></head><body>' + bodyHtml + '</body></html>';

        var blob = new Blob(['\ufeff' + wordDoc], { type: 'application/msword' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = '要件定義書_' + getExportDateStr() + '.doc';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      });

      // ===== Excel（.csv）ダウンロード =====
      document.getElementById('excel-export-btn').addEventListener('click', function() {
        var md = window.generatedMarkdown;
        if (!md) { alert('先に要件定義書を生成してください。'); return; }

        // Markdown を「# セクション」単位に分割して2列CSVに変換する
        var rows           = [['セクション', '内容']];
        var currentSection = '';
        var currentLines   = [];

        md.split('\n').forEach(function(line) {
          // 「# 」で始まり「## 」でない行をセクション区切りとする
          if (line.startsWith('# ') && !line.startsWith('## ')) {
            if (currentSection) {
              rows.push([currentSection, currentLines.join('\n').trim()]);
            }
            currentSection = line.slice(2).trim();
            currentLines   = [];
          } else {
            currentLines.push(line);
          }
        });
        if (currentSection) {
          rows.push([currentSection, currentLines.join('\n').trim()]);
        }

        // CSV エスケープ：ダブルクォートを "" に変換してセルを " で囲む
        var csv = rows.map(function(row) {
          return row.map(function(cell) {
            return '"' + cell.replace(/"/g, '""') + '"';
          }).join(',');
        }).join('\r\n');

        var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = '要件定義書_' + getExportDateStr() + '.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      });

    }); // DOMContentLoaded end

    // ============================================================
    // Markdownレンダリング関数（DOMContentLoaded外に置いてグローバルに使用）
    // ============================================================
    // Markdown → HTML 変換ルール（優先度順）：
    //   # text  → <h2>（セクション大見出し）
    //   ## text → <h3>（サブ見出し）
    //   ### text→ <h4>（小見出し）
    //   1. text → <ol><li>（番号付きリスト）
    //   - text  → <ul><li>（箇条書きリスト）
    //   ---     → <hr>（区切り線）
    //   **text**→ <strong>（太字インライン）
    //   空行    → リストを閉じる区切り
    //   その他  → <p>（通常段落）
    function renderMarkdown(markdownText) {
      var outputContent = document.getElementById('output-content');
      var lines         = markdownText.split('\n');
      var htmlLines     = [];
      var inList        = false; // <ul> が開いているか
      var inOrderedList = false; // <ol> が開いているか

      // 開いているリストタグをすべて閉じる共通処理
      function closeOpenLists() {
        if (inList)        { htmlLines.push('</ul>'); inList = false; }
        if (inOrderedList) { htmlLines.push('</ol>'); inOrderedList = false; }
      }

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        // 長いプレフィックスから先にチェックすることで誤判定を防ぐ
        if (line.startsWith('### ')) {
          closeOpenLists();
          htmlLines.push('<h4>' + escapeHtml(line.slice(4)) + '</h4>');
        } else if (line.startsWith('## ')) {
          closeOpenLists();
          htmlLines.push('<h3>' + escapeHtml(line.slice(3)) + '</h3>');
        } else if (line.startsWith('# ')) {
          closeOpenLists();
          htmlLines.push('<h2>' + escapeHtml(line.slice(2)) + '</h2>');
        } else if (/^\d+\. /.test(line)) {
          // 番号付きリスト
          if (inList) { htmlLines.push('</ul>'); inList = false; }
          if (!inOrderedList) { htmlLines.push('<ol>'); inOrderedList = true; }
          htmlLines.push('<li>' + applyInlineMarkdown(escapeHtml(line.replace(/^\d+\. /, ''))) + '</li>');
        } else if (line.startsWith('- ') || line.startsWith('* ')) {
          // 箇条書きリスト
          if (inOrderedList) { htmlLines.push('</ol>'); inOrderedList = false; }
          if (!inList) { htmlLines.push('<ul>'); inList = true; }
          htmlLines.push('<li>' + applyInlineMarkdown(escapeHtml(line.slice(2))) + '</li>');
        } else if (line.trim() === '---') {
          closeOpenLists();
          htmlLines.push('<hr>');
        } else if (line.trim() === '') {
          closeOpenLists();
          htmlLines.push('');
        } else {
          closeOpenLists();
          htmlLines.push('<p>' + applyInlineMarkdown(escapeHtml(line)) + '</p>');
        }
      }

      closeOpenLists(); // 末尾で開いたままのリストを閉じる
      outputContent.innerHTML = htmlLines.join('\n');
    }

    // **太字** を <strong> に変換するインラインMarkdownヘルパー
    function applyInlineMarkdown(text) {
      return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    // HTMLの特殊文字をエスケープする関数（XSS対策：必ず escapeHtml を先に通す）
    function escapeHtml(text) {
      return text
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#039;');
    }
  </script>
