<!DOCTYPE html>
<!-- AI要件定義システム：現場の曖昧な発話を要件定義書に変換するWebアプリ -->
<html lang="ja">
<head>
  <!-- 文字コードをUTF-8に設定（日本語対応） -->
  <meta charset="UTF-8">
  <!-- スマホ・タブレットでも正しく表示されるようにビューポートを設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ブラウザのタブに表示されるタイトル -->
  <title>AI要件定義システム</title>
  <style>
    /* ===== 全体リセット：ブラウザごとのデフォルトスタイルをそろえる ===== */
    * {
      box-sizing: border-box; /* パディングをサイズに含める */
      margin: 0;              /* 余白をゼロリセット */
      padding: 0;             /* 内側余白をゼロリセット */
    }

    /* ===== ページ全体のスタイル ===== */
    body {
      font-family: 'Meiryo', 'メイリオ', 'Hiragino Sans', sans-serif; /* 日本語フォント */
      font-size: 16px;           /* 基本フォントサイズ */
      background-color: #f0f4f8; /* 薄いグレー背景 */
      color: #2d3748;            /* 文字色：濃いグレー */
      min-height: 100vh;         /* 画面いっぱいの高さ */
    }

    /* ===== ヘッダー部分 ===== */
    header {
      background-color: #2b6cb0; /* 建設業らしい落ち着いたブルー */
      color: white;              /* 文字色：白 */
      padding: 16px 24px;        /* 内側余白 */
      display: flex;             /* 横並びレイアウト */
      align-items: center;       /* 縦方向中央揃え */
      flex-wrap: wrap;           /* 画面が狭いときは折り返す */
      gap: 12px;                 /* 要素間の隙間 */
    }

    /* ===== ヘッダーのタイトル文字 ===== */
    header h1 {
      font-size: 20px;  /* タイトルのフォントサイズ */
      flex: 1;          /* 残りスペースを占有する */
    }

    /* ===== APIキー入力欄のラベル ===== */
    #api-key-label {
      font-size: 13px; /* 小さめのラベル文字 */
      white-space: nowrap; /* 折り返さない */
    }

    /* ===== APIキー入力テキストボックス ===== */
    #api-key-input {
      padding: 8px 12px;         /* 内側余白 */
      border: none;              /* 枠線なし */
      border-radius: 6px;        /* 角丸 */
      font-size: 14px;           /* フォントサイズ */
      width: 280px;              /* 横幅 */
      background-color: #ebf4ff; /* 薄いブルー背景 */
      color: #2d3748;            /* 文字色 */
    }

    /* ===== メインコンテンツエリア ===== */
    main {
      max-width: 860px;    /* 最大横幅 */
      margin: 32px auto;   /* 上下余白＋左右自動で中央揃え */
      padding: 0 16px;     /* 左右の余白（スマホ対応） */
    }

    /* ===== セクションカード（入力・出力エリアの白いボックス） ===== */
    .card {
      background-color: white;  /* 白背景 */
      border-radius: 10px;      /* 角丸 */
      padding: 24px;            /* 内側余白 */
      margin-bottom: 24px;      /* カード間の隙間 */
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); /* 薄い影 */
    }

    /* ===== セクションタイトル ===== */
    .section-title {
      font-size: 15px;         /* フォントサイズ */
      font-weight: bold;       /* 太字 */
      color: #2b6cb0;          /* ブルー */
      margin-bottom: 16px;     /* 下余白 */
      padding-bottom: 8px;     /* 下内余白 */
      border-bottom: 2px solid #bee3f8; /* 薄いブルーの下線 */
    }

    /* ===== テキスト入力エリア ===== */
    #input-textarea {
      width: 100%;            /* 横幅いっぱい */
      height: 160px;          /* 高さ */
      padding: 12px;          /* 内側余白 */
      border: 2px solid #bee3f8; /* 薄いブルー枠線 */
      border-radius: 8px;     /* 角丸 */
      font-size: 15px;        /* フォントサイズ（現場担当者が読みやすいサイズ） */
      font-family: inherit;   /* 親要素のフォントを引き継ぐ */
      resize: vertical;       /* 縦方向にだけリサイズ可能 */
      line-height: 1.6;       /* 行間を広めにして読みやすくする */
      color: #2d3748;         /* 文字色 */
    }

    /* ===== テキスト入力エリア：フォーカス時の見た目 ===== */
    #input-textarea:focus {
      outline: none;                /* デフォルトのアウトラインを消す */
      border-color: #2b6cb0;        /* ブルーに変える */
      box-shadow: 0 0 0 3px rgba(43,108,176,0.15); /* 薄いブルーのグロー */
    }

    /* ===== ボタン共通スタイル ===== */
    .btn {
      padding: 12px 24px;     /* 押しやすい大きさの内側余白 */
      border: none;           /* 枠線なし */
      border-radius: 8px;     /* 角丸 */
      font-size: 15px;        /* フォントサイズ */
      font-weight: bold;      /* 太字 */
      cursor: pointer;        /* カーソルをポインターに */
      transition: all 0.2s;  /* ホバー時にアニメーションをつける */
    }

    /* ===== ヒアリングボタン・生成ボタン共通スタイル ===== */
    #hearing-btn, #generate-btn {
      background-color: #2b6cb0; /* ブルー背景 */
      color: white;              /* 白文字 */
      width: 100%;               /* 横幅いっぱい */
      margin-top: 16px;          /* 上余白 */
      font-size: 17px;           /* 少し大きめの文字 */
    }

    /* ===== ヒアリングボタン・生成ボタン：ホバー時 ===== */
    #hearing-btn:hover, #generate-btn:hover {
      background-color: #2c5282; /* 少し暗くする */
      transform: translateY(-1px); /* 少し浮き上がる */
    }

    /* ===== ヒアリングボタン・生成ボタン：ローディング中（非活性状態） ===== */
    #hearing-btn:disabled, #generate-btn:disabled {
      background-color: #a0aec0; /* グレーに変える */
      cursor: not-allowed;       /* カーソルを禁止マークに */
      transform: none;           /* アニメーションなし */
    }

    /* ===== 文字数カウンター ===== */
    #char-count {
      text-align: right;   /* 右揃え */
      font-size: 12px;     /* 小さい文字 */
      color: #718096;      /* グレー */
      margin-top: 4px;     /* 上余白 */
    }

    /* ===== 回答入力エリア（質問カード内）===== */
    #answer-textarea {
      width: 100%;               /* 横幅いっぱい */
      height: 200px;             /* 高さ（質問への回答は少し高め）*/
      padding: 12px;             /* 内側余白 */
      border: 2px solid #bee3f8; /* 薄いブルー枠線 */
      border-radius: 8px;        /* 角丸 */
      font-size: 15px;           /* フォントサイズ */
      font-family: inherit;      /* 親要素のフォントを引き継ぐ */
      resize: vertical;          /* 縦方向にだけリサイズ可能 */
      line-height: 1.6;          /* 行間を広めにして読みやすくする */
      color: #2d3748;            /* 文字色 */
    }

    /* ===== 回答入力エリア：フォーカス時の見た目 ===== */
    #answer-textarea:focus {
      outline: none;
      border-color: #2b6cb0;
      box-shadow: 0 0 0 3px rgba(43,108,176,0.15);
    }

    /* ===== 回答の文字数カウンター ===== */
    #answer-char-count {
      text-align: right;
      font-size: 12px;
      color: #718096;
      margin-top: 4px;
    }

    /* ===== AIの質問表示エリア ===== */
    #question-content {
      white-space: pre-wrap;    /* 改行・スペースをそのまま表示する */
      line-height: 1.9;         /* 読みやすい行間 */
      font-size: 15px;          /* フォントサイズ */
      color: #2d3748;           /* 文字色 */
      background: #f7fafc;      /* 薄いグレー背景（質問エリアをわかりやすくする）*/
      border: 1px solid #e2e8f0; /* 薄いグレー枠線 */
      border-radius: 8px;        /* 角丸 */
      padding: 16px;             /* 内側余白 */
      margin-bottom: 4px;        /* 回答エリアとの間隔 */
    }

    /* ===== 回答セクションの小タイトル ===== */
    .answer-section-label {
      font-size: 14px;
      font-weight: bold;
      color: #4a5568;
      margin: 20px 0 8px;
    }

    /* ===== 質問カード内のローディング表示 ===== */
    #question-loading-area {
      display: none;
      text-align: center;
      padding: 24px;
      color: #2b6cb0;
      font-size: 16px;
    }

    /* ===== 質問カード内のエラー表示 ===== */
    #question-error-area {
      display: none;
      background-color: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: 16px;
      color: #c53030;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== 音声入力ボタン：録音中の状態 ===== */
    #voice-btn.recording {
      background-color: #e53e3e; /* 録音中は赤色に変える */
      animation: pulse 1s infinite; /* 点滅アニメーション */
    }

    /* ===== 録音中の点滅アニメーション定義 ===== */
    @keyframes pulse {
      0%   { opacity: 1; }    /* 完全表示 */
      50%  { opacity: 0.6; }  /* 半透明 */
      100% { opacity: 1; }    /* 完全表示に戻る */
    }

    /* ===== ローディングスピナー（API呼び出し中に表示） ===== */
    #loading-area {
      display: none;         /* 通常は非表示 */
      text-align: center;    /* 中央揃え */
      padding: 32px;         /* 余白 */
      color: #2b6cb0;        /* ブルー文字 */
      font-size: 16px;       /* フォントサイズ */
    }

    /* ===== くるくる回るスピナーのアニメーション ===== */
    .spinner {
      display: inline-block;  /* インラインブロック */
      width: 36px;            /* 幅 */
      height: 36px;           /* 高さ */
      border: 4px solid #bee3f8;         /* 薄いブルーの枠線 */
      border-top-color: #2b6cb0;         /* 上だけ濃いブルー（回転して見える） */
      border-radius: 50%;                /* 円形にする */
      animation: spin 0.8s linear infinite; /* 0.8秒で1回転 */
      margin-bottom: 12px;   /* 下余白 */
    }

    /* ===== スピナーの回転アニメーション定義 ===== */
    @keyframes spin {
      to { transform: rotate(360deg); } /* 360度回転 */
    }

    /* ===== エラーメッセージ表示エリア ===== */
    #error-area {
      display: none;              /* 通常は非表示 */
      background-color: #fff5f5;  /* 薄い赤背景 */
      border: 1px solid #feb2b2;  /* 赤枠線 */
      border-radius: 8px;         /* 角丸 */
      padding: 16px;              /* 内側余白 */
      color: #c53030;             /* 赤文字 */
      margin-top: 16px;           /* 上余白 */
      font-size: 14px;            /* フォントサイズ */
      line-height: 1.6;           /* 行間 */
    }

    /* ===== 出力エリアのヘッダー（タイトルとコピーボタンを横並び）===== */
    #output-header {
      display: flex;           /* 横並び */
      justify-content: space-between; /* 左右に振り分ける */
      align-items: center;     /* 縦中央揃え */
      margin-bottom: 16px;     /* 下余白 */
      padding-bottom: 8px;     /* 下内余白 */
      border-bottom: 2px solid #bee3f8; /* 薄いブルー下線 */
    }

    /* ===== コピーボタン ===== */
    #copy-btn {
      background-color: #48bb78; /* グリーン */
      color: white;              /* 白文字 */
      padding: 8px 20px;         /* 内側余白 */
      border: none;              /* 枠線なし */
      border-radius: 6px;        /* 角丸 */
      font-size: 14px;           /* フォントサイズ */
      font-weight: bold;         /* 太字 */
      cursor: pointer;           /* ポインターカーソル */
      transition: background 0.2s; /* ホバーアニメーション */
    }

    /* ===== コピーボタン：ホバー時 ===== */
    #copy-btn:hover {
      background-color: #38a169; /* 少し暗いグリーン */
    }

    /* ===== コピー成功時のスタイル ===== */
    #copy-btn.copied {
      background-color: #2b6cb0; /* ブルーに変える */
    }

    /* ===== Markdownレンダリング結果の表示エリア ===== */
    #output-content {
      line-height: 1.8;   /* 読みやすい行間 */
      font-size: 15px;    /* フォントサイズ */
      color: #2d3748;     /* 文字色 */
    }

    /* ===== 見出し1（# ）→ <h2> のスタイル：セクション大見出し ===== */
    #output-content h2 {
      font-size: 18px;             /* フォントサイズ */
      font-weight: bold;           /* 太字 */
      color: #2b6cb0;              /* ブルー */
      margin: 24px 0 12px;         /* 上下余白 */
      padding-bottom: 6px;         /* 下内余白 */
      border-bottom: 2px solid #bee3f8; /* 薄いブルー下線 */
    }

    /* ===== 見出し2（## ）→ <h3> のスタイル：サブセクション見出し ===== */
    #output-content h3 {
      font-size: 16px;     /* フォントサイズ */
      font-weight: bold;   /* 太字 */
      color: #2c5282;      /* 少し暗いブルー */
      margin: 16px 0 8px;  /* 上下余白 */
    }

    /* ===== 見出し3（### ）→ <h4> のスタイル：小見出し ===== */
    #output-content h4 {
      font-size: 14px;     /* フォントサイズ */
      font-weight: bold;   /* 太字 */
      color: #4a5568;      /* グレー寄りのブルー */
      margin: 12px 0 6px;  /* 上下余白 */
    }

    /* ===== 箇条書きリスト（- ）のスタイル ===== */
    #output-content ul {
      padding-left: 24px;  /* 左インデント */
      margin: 8px 0;       /* 上下余白 */
    }

    /* ===== 番号付きリスト（1. ）のスタイル ===== */
    #output-content ol {
      padding-left: 24px;  /* 左インデント */
      margin: 8px 0;       /* 上下余白 */
    }

    /* ===== リスト各項目のスタイル（ul・ol 共通）===== */
    #output-content li {
      margin-bottom: 6px;  /* 項目間の余白 */
      line-height: 1.7;    /* 行間 */
    }

    /* ===== 太字（**テキスト**）のスタイル ===== */
    #output-content strong {
      color: #2d3748;      /* 文字色 */
      font-weight: bold;   /* 太字 */
    }

    /* ===== 区切り線（---）のスタイル ===== */
    #output-content hr {
      border: none;                       /* デフォルト枠なし */
      border-top: 1px solid #e2e8f0;      /* 薄いグレーの横線 */
      margin: 20px 0;                     /* 上下余白 */
    }

    /* ===== 段落のスタイル ===== */
    #output-content p {
      margin: 8px 0;  /* 上下余白 */
    }

    /* ===== 編集ボタン（グレー）===== */
    #edit-btn {
      background-color: #718096; /* グレー */
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    /* ===== 編集ボタン：ホバー時 ===== */
    #edit-btn:hover {
      background-color: #4a5568;
    }

    /* ===== 編集完了ボタン（グリーン）===== */
    #edit-done-btn {
      background-color: #48bb78; /* グリーン */
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    /* ===== 編集完了ボタン：ホバー時 ===== */
    #edit-done-btn:hover {
      background-color: #38a169;
    }

    /* ===== 編集中のコンテンツエリア：点線枠で編集可能を示す ===== */
    #output-content[contenteditable="true"] {
      border: 2px dashed #2b6cb0; /* 青い点線枠 */
      border-radius: 8px;
      padding: 12px;
      outline: none;   /* デフォルトのフォーカス枠を消す */
      cursor: text;    /* テキストカーソルを表示する */
    }

    /* ===== フッター ===== */
    footer {
      text-align: center;   /* 中央揃え */
      padding: 24px;        /* 内側余白 */
      color: #a0aec0;       /* 薄いグレー文字 */
      font-size: 13px;      /* 小さいフォント */
    }
  </style>
</head>
<body>

  <!-- ===== ヘッダー：タイトルとAPIキー入力 ===== -->
  <header>
    <!-- アプリのタイトル -->
    <h1>🏗 AI要件定義システム</h1>
    <!-- APIキー入力ラベル -->
    <span id="api-key-label">Claude APIキー：</span>
    <!-- APIキー入力欄（セキュリティのためtype="password"にして見えないようにする） -->
    <input
      type="password"
      id="api-key-input"
      placeholder="sk-ant-api03-..."
      title="Claude APIキーを入力してください"
      autocomplete="off"
    >
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main>
    <!-- 入力エリアカード -->
    <div class="card">
      <div class="section-title">📝 現場の状況・要望を入力</div>
      <!-- テキスト入力エリア：直接キーボードで入力できる -->
      <textarea
        id="input-textarea"
        placeholder="例：「現場の進捗管理をもっと楽にしたい。今は紙の日報を使っているけど、スマホで写真を撮って報告できるようにしたい。所長も現場に来なくても状況が分かるようにしたい。」"
      ></textarea>
      <!-- 文字数カウンター（入力量の目安） -->
      <div id="char-count">0 文字</div>

      <!-- ===== 音声入力ボタン（Task 3 で機能を追加）===== -->
      <div id="voice-area" style="margin-top:12px; display:flex; gap:12px; align-items:center;">
        <!-- 音声入力ボタン：Web Speech API非対応ブラウザでは非表示にする -->
        <button class="btn" id="voice-btn" style="background:#38a169;color:white;" title="ボタンを押している間、音声を録音します">
          🎤 音声入力（押している間）
        </button>
        <!-- 録音中のステータス表示 -->
        <span id="voice-status" style="font-size:14px; color:#718096;"></span>
      </div>

      <!-- ヒアリング開始ボタン：クリックするとAIが確認質問を生成する（STEP 1）-->
      <button class="btn" id="hearing-btn">
        💬 ヒアリングを開始する
      </button>

      <!-- ローディング表示（STEP 1 のAPI呼び出し中に表示される） -->
      <div id="loading-area">
        <!-- くるくるスピナー -->
        <div class="spinner"></div>
        <div id="loading-message">Claude AIが確認事項を考えています...<br>しばらくお待ちください（5〜15秒程度）</div>
      </div>

      <!-- エラーメッセージ表示エリア -->
      <div id="error-area"></div>
    </div>

    <!-- ===== 深掘りヒアリングカード（STEP 1 完了後に表示）===== -->
    <div class="card" id="question-card" style="display:none;">
      <!-- カードのタイトル -->
      <div class="section-title">💬 AIからの確認事項</div>
      <!-- AIが生成した質問をそのまま表示するエリア -->
      <div id="question-content"></div>

      <!-- 回答入力セクション -->
      <div class="answer-section-label">📝 上記の質問にご回答ください（番号順に）</div>
      <!-- 質問への回答をまとめて入力するテキストエリア -->
      <textarea
        id="answer-textarea"
        placeholder="例：&#10;1. 現在は紙の日報で管理しています。毎日10〜20枚ほど処理しています。&#10;2. 現場作業員15名と所長2名が使います。本社管理者3名が確認します。&#10;3. ..."
      ></textarea>
      <!-- 回答の文字数カウンター -->
      <div id="answer-char-count">0 文字</div>

      <!-- 要件定義書を生成するボタン（STEP 2）-->
      <button class="btn" id="generate-btn">
        ✨ 要件定義書を生成する
      </button>

      <!-- STEP 2 のローディング表示（要件定義書生成中）-->
      <div id="question-loading-area">
        <div class="spinner"></div>
        <div>Claude AIが要件定義書を生成しています...<br>しばらくお待ちください（10〜30秒程度）</div>
      </div>

      <!-- STEP 2 のエラー表示 -->
      <div id="question-error-area"></div>
    </div>

    <!-- ===== 生成結果表示エリア ===== -->
    <div class="card" id="output-card" style="display:none;">
      <!-- 出力エリアのヘッダー（タイトルとコピーボタン） -->
      <div id="output-header">
        <!-- 出力エリアのタイトル -->
        <div class="section-title" style="margin-bottom:0; border-bottom:none; padding-bottom:0;">
          📄 生成された要件定義書
        </div>

  <script>
    // ===== JavaScriptの初期化処理 =====

      var API_URL = 'http://localhost:3001/api/claude';

      // apiKey: APIキー文字列
      // systemPrompt: Claudeへの指示
      // userMessage: ユーザーメッセージ文字列
      // 戻り値: Claudeの返答テキスト（Promise）
      async function callClaudeApi(apiKey, systemPrompt, userMessage) {
        var requestBody = {
          model: 'claude-sonnet-4-20250514', // 使用するモデル
          max_tokens: 4000,                  // 最大生成トークン数
          system: systemPrompt,              // システムプロンプト
          messages: [{ role: 'user', content: userMessage }]
        };

        var response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json', // JSONを送ることを宣言
            'x-api-key': apiKey                 // APIキーをプロキシへ転送
          },
          body: JSON.stringify(requestBody)
        });

        // HTTPエラー（4xx/5xx）を日本語メッセージに変換する
        if (!response.ok) {
          var errorMsg = 'APIエラーが発生しました（HTTPステータス：' + response.status + '）\n';
          if (response.status === 401) {
            errorMsg += 'APIキーが無効です。正しいAPIキーを入力してください。';
          } else if (response.status === 429) {
            errorMsg += 'APIの利用制限に達しました。しばらく待ってから再試行してください。';
          } else if (response.status === 400) {
            errorMsg += 'リクエストの形式が不正です。入力内容を確認してください。';
          } else {
            try {
              var errorData = await response.json();
              errorMsg += (errorData.error && errorData.error.message) ? errorData.error.message : '不明なエラー';
            } catch (_) {
              errorMsg += 'サーバーからのレスポンスを解析できませんでした。';
            }
          }
          throw new Error(errorMsg);
        }

        var data = await response.json();

        // レスポンス構造を安全に確認する
        if (!data.content || !data.content[0] || !data.content[0].text) {
          throw new Error('APIから有効なレスポンスが返りませんでした。もう一度お試しください。');
        }
        return data.content[0].text; // 返答テキストを返す
      }

      // ===== エラーメッセージを安全にDOM表示する共通関数（XSS対策）=====
      // errorArea: 表示先のDOM要素
      // message: 表示するエラー文字列（改行\nを含んでよい）
      function showError(errorArea, message) {
        errorArea.style.display = 'block';
        errorArea.textContent = ''; // 前回のエラーをクリアする
        errorArea.appendChild(document.createTextNode('⚠️ ')); // プレフィックス
        message.split('\n').forEach(function(line, i) {
          if (i > 0) errorArea.appendChild(document.createElement('br')); // 改行を<br>で挿入
          errorArea.appendChild(document.createTextNode(line)); // 各行をテキストノードで追加（HTML注入不可）
        });
      }

      var savedInitialRequest = ''; // ユーザーの最初の要望

      // ===== STEP 1：ヒアリングボタンのクリック処理 =====

      hearingBtn.addEventListener('click', async function() {

        // 音声入力中の場合は先に停止する（同時動作を防ぐ）

        document.getElementById('loading-area').style.display = 'block';
        var errorArea = document.getElementById('error-area');
        errorArea.style.display = 'none';
        errorArea.textContent = '';
        // 以前の質問カード・出力カードを非表示にする（やり直し対応）

        try {
          // ===== AIに確認質問を生成させる =====
          var hearingSystemPrompt = `あなたはITシステムの要件定義の専門家です。
現場担当者から最初の要望を受け取りました。
より精確な要件定義書を作成するために、以下の観点のうち特に重要な情報を3〜5個の質問にまとめてください。

- ステークホルダー（誰が使うか・何人くらいか・誰が承認するか）
- 制約条件（予算感・導入希望時期・既存システムとの連携・対応デバイス）
- 優先度（絶対に必要な機能 vs あれば嬉しい機能）

出力形式：
- 番号付きで3〜5個の質問のみを出力する（前置き・後書き不要）

- 各質問は1〜2文で簡潔に
- 現場の方が答えやすい平易な言葉を使う
- 日本語で出力する`;

          var hearingUserMessage = '以下の要望に対して、確認質問を生成してください。\n\n' + inputText;

          var questionsText = await callClaudeApi(apiKey, hearingSystemPrompt, hearingUserMessage);

          // 取得した質問と最初の要望を変数に保存する（STEP 2 で使う）
          savedInitialRequest = inputText;
          savedQuestionsText  = questionsText;

          // ===== 質問をカードに表示する =====
          document.getElementById('question-content').textContent = questionsText;
          // 回答テキストエリアをクリアする（やり直し対応）
          answerTextarea.value = '';

          var qErrorArea = document.getElementById('question-error-area');

      generateBtn.addEventListener('click', async function() {

        // APIキーが入力されているか確認する

        try {
          // ===== 最初の要望＋質問＋回答を統合して要件定義書を生成する =====
          var requirementsSystemPrompt = `あなたはITシステムの要件定義の専門家です。
現場担当者から最初の要望と、追加ヒアリングの回答を受け取りました。

必ず以下の6セクションをすべて含めてください。セクション名は正確に記載してください：

# システム名

# 目的・背景

# 機能要件

---

注意事項：
- 建設業・現場担当者が話す言葉から本質的な要件を読み取ってください

          // ユーザーメッセージは「最初の要望＋質問＋回答」をまとめて渡す
          var requirementsUserMessage =
            '【最初の要望】\n' + savedInitialRequest +
            '\n\n【AIの確認質問】\n' + savedQuestionsText +
            '\n\n【担当者の回答】\n' + answerText +

          var markdownText = await callClaudeApi(apiKey, requirementsSystemPrompt, requirementsUserMessage);

        } catch (error) {

      // ===== 音声入力機能（Web Speech API）=====

        document.getElementById('voice-area').style.display = 'none';

        // 多重起動防止フラグ（true のとき認識中なので start() を呼ばない）
        var isRecording = false;

          for (var i = event.resultIndex; i < event.results.length; i++) {

              finalText += event.results[i][0].transcript;

            }

          voiceBtn.classList.add('recording');              // 赤い点滅スタイルを追加する
          voiceBtn.textContent = '🔴 録音中（離したら停止）'; // ボタンテキストを変える

        });

        voiceBtn.addEventListener('touchend', function() {

        voiceBtn.addEventListener('touchcancel', function() {

          var textToCopy = window.generatedMarkdown;

          // コピーするテキストがない場合は何もしない
          if (!textToCopy) {
            return;
          }

          // 前回のタイマーが残っていればキャンセルする（連続クリック対策）
          if (copyResetTimer) {
            clearTimeout(copyResetTimer); // 前のタイマーを止める
            copyResetTimer = null;        // タイマーIDをリセットする
          }

          // クリップボードAPIを使ってコピーする
          // navigator.clipboard は HTTPS または localhost でのみ動作する
          if (navigator.clipboard && window.isSecureContext) {
            // クリップボードAPIが使える場合（推奨）
            navigator.clipboard.writeText(textToCopy).then(function() {
              // コピー成功時のフィードバックを表示する
              showCopySuccess();
            }).catch(function() {
              // クリップボードAPIが失敗した場合はフォールバックを使う
              fallbackCopy(textToCopy);
            });
          } else {
            // HTTP環境など、クリップボードAPIが使えない場合のフォールバック
            fallbackCopy(textToCopy);
          }
        });

        // ===== コピー成功時のフィードバック表示（共通処理）=====
        function showCopySuccess() {
          // ボタンのテキストを「コピーしました！」に変える
          copyBtn.textContent = '✅ コピーしました！';
          // 青色スタイルを適用する
          copyBtn.classList.add('copied');
          // 2秒後に元のテキストに戻す（タイマーIDを保存して重複を防ぐ）
          copyResetTimer = setTimeout(function() {
            copyBtn.textContent = '📋 Markdownをコピー'; // 元のテキストに戻す
            copyBtn.classList.remove('copied');           // 青色スタイルを解除する
            copyResetTimer = null;                        // タイマーIDをクリアする
          }, 2000);
        }

        // ===== クリップボードAPIが使えない環境でのコピー処理（フォールバック）=====
        function fallbackCopy(text) {
          // 一時的な非表示テキストエリアを作成する
          var tempTextarea = document.createElement('textarea');
          tempTextarea.value = text;             // コピーするテキストを設定する
          // 画面外に配置して見えないようにする（display:noneではselect()が動かないためfixedを使う）
          tempTextarea.style.position = 'fixed';
          tempTextarea.style.left = '-9999px';   // 画面左端の外側に配置する
          tempTextarea.style.top = '-9999px';    // 画面上端の外側に配置する
          document.body.appendChild(tempTextarea); // DOMに追加する（select()に必要）
          tempTextarea.focus();                  // テキストエリアにフォーカスを当てる
          tempTextarea.select();                 // テキスト全体を選択する
          // 古いコピーコマンドを実行する（IE・一部ブラウザ向けレガシー方式）
          var success = document.execCommand('copy');
          document.body.removeChild(tempTextarea); // 使い終わったテキストエリアを削除する

          if (success) {
            // コピー成功フィードバックを表示する
            showCopySuccess();
          } else {
            // コピー失敗時はアラートで手動コピーを案内する
            alert('コピーに失敗しました。\n手動でテキストを選択してCtrl+Cでコピーしてください。');
          }
        }

      } // if (copyBtn) end

      // ===== 編集ボタン：クリックでコンテンツを直接編集できるようにする =====
      var editBtn     = document.getElementById('edit-btn');
      var editDoneBtn = document.getElementById('edit-done-btn');
      var outputEditTarget = document.getElementById('output-content');

      // 「編集する」ボタンのクリック処理
      editBtn.addEventListener('click', function() {
        // contenteditable を有効にして直接編集できるようにする
        outputEditTarget.contentEditable = 'true';
        outputEditTarget.focus(); // 編集エリアにフォーカスを当てる
        editBtn.style.display     = 'none';          // 「編集する」を隠す
        editDoneBtn.style.display = 'inline-block';  // 「編集を完了する」を表示する
      });

      // 「編集を完了する」ボタンのクリック処理
      editDoneBtn.addEventListener('click', function() {
        // contenteditable を無効にして閲覧モードに戻す（編集内容はHTMLとして保持される）
        outputEditTarget.removeAttribute('contenteditable');
        editDoneBtn.style.display = 'none';          // 「完了」を隠す
        editBtn.style.display     = 'inline-block';  // 「編集する」を再表示する
      });

    });

    // ===== Markdownテキストを HTML に変換して #output-content に表示する関数 =====
    // 外部ライブラリを使わず自前実装（正規表現＋行ごとのパース）
    //
    // Markdown → HTML 変換ルール（優先度順）：
    //   ###  → <h4>  （小見出し）
    //   ##   → <h3>  （サブセクション見出し）
    //   #    → <h2>  （セクション大見出し。ページ<h1>はヘッダーが使うためh2から）
    //   1.   → <ol><li>  （番号付きリスト）
    //   -  * → <ul><li>  （箇条書きリスト）
    //   ---  → <hr>       （区切り線）
    //   空行  → リストを閉じる区切り
    //   その他→ <p>       （通常テキスト）
    //   **太字** → <strong>  （インライン書式）
    function renderMarkdown(markdownText) {
      // 出力先の要素を取得する
      var outputContent = document.getElementById('output-content');

      // 改行で分割して行の配列にする
      var lines = markdownText.split('\n');

      // 変換後のHTML文字列を入れる配列
      var htmlLines = [];

      // 現在開いているリスト種別を管理するフラグ
      var inList        = false; // <ul>（箇条書き）が開いているか
      var inOrderedList = false; // <ol>（番号付き）が開いているか

      // ===== 開いているリストタグをすべて閉じる共通処理 =====
      // 見出し・区切り線・空行が来たときに呼び出す
      function closeOpenLists() {
        if (inList)        { htmlLines.push('</ul>'); inList = false; }
        if (inOrderedList) { htmlLines.push('</ol>'); inOrderedList = false; }
      }

      // ===== 各行を順番に処理する =====
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        // --- 見出し3（### ）→ <h4> ---
        // ※ 長いプレフィックスから先にチェックすることで ## や # との誤判定を防ぐ
        if (line.startsWith('### ')) {
          closeOpenLists();
          htmlLines.push('<h4>' + escapeHtml(line.slice(4)) + '</h4>');
        }

        // --- 見出し2（## ）→ <h3> ---
        else if (line.startsWith('## ')) {
          closeOpenLists();
          htmlLines.push('<h3>' + escapeHtml(line.slice(3)) + '</h3>');
        }

        // --- 見出し1（# ）→ <h2> ---
        // ※ ## や ### は上のブランチで処理済みなので、ここに来るのは単一 # のみ
        else if (line.startsWith('# ')) {
          closeOpenLists();
          htmlLines.push('<h2>' + escapeHtml(line.slice(2)) + '</h2>');
        }

        // --- 番号付きリスト（1. 2. 3. ... ）→ <ol><li> ---
        else if (/^\d+\. /.test(line)) {
          if (inList) { htmlLines.push('</ul>'); inList = false; } // 箇条書きが開いていれば先に閉じる
          if (!inOrderedList) { htmlLines.push('<ol>'); inOrderedList = true; }
          var numText = line.replace(/^\d+\. /, ''); // 「番号. 」を除いたテキストを取り出す
          htmlLines.push('<li>' + applyInlineMarkdown(escapeHtml(numText)) + '</li>');
        }

        // --- 箇条書き（- または * ）→ <ul><li> ---
        else if (line.startsWith('- ') || line.startsWith('* ')) {
          if (inOrderedList) { htmlLines.push('</ol>'); inOrderedList = false; } // 番号リストが開いていれば先に閉じる
          if (!inList) { htmlLines.push('<ul>'); inList = true; }
          var ulText = line.slice(2); // 「- 」または「* 」を除いたテキストを取り出す
          htmlLines.push('<li>' + applyInlineMarkdown(escapeHtml(ulText)) + '</li>');
        }

        // --- 区切り線（--- のみの行）→ <hr> ---
        else if (line.trim() === '---') {
          closeOpenLists();
          htmlLines.push('<hr>');
        }

        // --- 空行 → リストを閉じるトリガー ---
        else if (line.trim() === '') {
          closeOpenLists();
          htmlLines.push(''); // 空行はそのまま残す（段落間の余白）
        }

        // --- 通常のテキスト行 → <p> ---
        else {
          closeOpenLists();
          htmlLines.push('<p>' + applyInlineMarkdown(escapeHtml(line)) + '</p>');
        }
      }

      // 末尾で開いたままのリストを閉じる
      closeOpenLists();

      // 生成したHTML文字列をまとめて出力エリアに適用する
      outputContent.innerHTML = htmlLines.join('\n');
    }

    // ===== インラインMarkdown（太字）を HTML に変換するヘルパー関数 =====
    function applyInlineMarkdown(text) {
      // **太字** を <strong>太字</strong> に変換する
      return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    // ===== HTMLの特殊文字をエスケープするヘルパー関数（XSS対策）=====
    // ユーザー入力やAI出力をHTMLとして表示する際に必須の処理
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')   // & → &amp;
        .replace(/</g, '&lt;')    // < → &lt;
        .replace(/>/g, '&gt;')    // > → &gt;
        .replace(/"/g, '&quot;')  // " → &quot;
        .replace(/'/g, '&#039;'); // ' → &#039;
    }
  </script>

</body>
