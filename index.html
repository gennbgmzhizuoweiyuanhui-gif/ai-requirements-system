<!DOCTYPE html>
<!-- AI要件定義システム：現場の曖昧な発話を要件定義書に変換するWebアプリ -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI要件定義システム</title>
  <style>
    /* ===== CSS カスタムプロパティ（テーマカラーを一元管理）===== */
    :root {
      --bg-base:      #0a0a0f;                              /* ページ背景（深い黒）*/
      --bg-card:      rgba(18, 18, 26, 0.85);               /* カード背景（半透明）*/
      --cyan:         #00d4ff;                              /* アクセント：シアン */
      --blue:         #0066ff;                              /* アクセント：ブルー */
      --grad:         linear-gradient(135deg, #00d4ff, #0066ff); /* メイングラデーション */
      --text:         #e2e8f0;                              /* 主要テキスト */
      --text-sub:     #94a3b8;                              /* サブテキスト */
      --border:       rgba(0, 212, 255, 0.12);              /* 枠線 */
      --glow-near:    rgba(0, 212, 255, 0.20);              /* 近距離グロー */
      --glow-far:     rgba(0, 212, 255, 0.07);              /* 遠距離グロー */
    }

    /* ===== 全体リセット ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== ページ全体：ダークテーマ＋光源グラデーション ===== */
    body {
      font-family: 'Meiryo', 'メイリオ', 'Hiragino Sans', sans-serif;
      font-size: 16px;
      background-color: var(--bg-base);
      /* 微妙な光源で奥行き感を演出する */
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(0,102,255,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(0,212,255,0.05) 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー：グラスモーフィズム＋sticky ===== */
    header {
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky; /* スクロールしてもヘッダーを固定する */
      top: 0;
      z-index: 100;
    }

    /* ===== タイトル：グラデーションテキスト ===== */
    header h1 {
      font-size: 18px;
      flex: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    /* ===== APIキーラベル ===== */
    #api-key-label {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
    }

    /* ===== APIキー入力欄 ===== */
    #api-key-input {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      width: 260px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #api-key-input:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(0,212,255,0.15);
    }

    /* ===== メインコンテンツエリア ===== */
    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
    }

    /* ===== グラスモーフィズムカード ===== */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.04); /* 上端に薄い光沢ライン */
    }

    /* 入力カードは CSS アニメーションでフェードインする */
    #input-card {
      animation: cardAppear 0.8s ease forwards;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== セクションタイトル ===== */
    .section-title {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    /* セクションタイトル下のグラデーションラインアクセント */
    .section-title::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 48px;
      height: 2px;
      background: var(--grad);
      border-radius: 2px;
    }

    /* ===== テキストエリア共通スタイル ===== */
    #input-textarea, #answer-textarea {
      width: 100%;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0, 212, 255, 0.18);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      line-height: 1.7;
      color: var(--text);
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
    }

    #input-textarea  { height: 160px; }
    #answer-textarea { height: 200px; }

    /* プレースホルダーの色 */
    #input-textarea::placeholder, #answer-textarea::placeholder {
      color: rgba(148, 163, 184, 0.4);
    }

    /* ===== フォーカス時：グローエフェクト（発光）===== */
    #input-textarea:focus, #answer-textarea:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.25),   /* 内側リング */
        0 0 20px var(--glow-near),          /* 近距離グロー */
        0 0 55px var(--glow-far);           /* 遠距離グロー */
    }

    /* ===== 文字数カウンター ===== */
    #char-count, #answer-char-count {
      display: inline-block;
      width: 100%;
      text-align: right;
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 6px;
      transition: color 0.25s ease, transform 0.15s ease;
    }

    /* 文字数変化時のバウンスアニメーション用クラス（JS で付与・解除）*/
    .count-bump {
      color: var(--cyan) !important;
      transform: scale(1.12);
    }

    /* ===== ボタン共通スタイル ===== */
    .btn {
      padding: 13px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      position: relative;  /* リップルエフェクト用 */
      overflow: hidden;    /* リップルがはみ出ないように */
      transition: transform 0.2s ease, box-shadow 0.3s ease, opacity 0.4s ease;
    }

    /* ===== ヒアリングボタン・生成ボタン共通：グラデーション ===== */
    #hearing-btn, #generate-btn {
      background: var(--grad);
      color: white;
      width: 100%;
      margin-top: 20px;
      font-size: 15px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(0, 102, 255, 0.3);
    }

    /* ホバー時：浮き上がり＋パルスグローアニメーション */
    #hearing-btn:not(:disabled):hover, #generate-btn:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(0,212,255,0.5);
      animation: btnPulse 2s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(0,102,255,0.3); }
      50%       { box-shadow: 0 4px 36px rgba(0,212,255,0.7), 0 0 70px rgba(0,212,255,0.2); }
    }

    /* 非活性状態 */
    #hearing-btn:disabled, #generate-btn:disabled {
      background: rgba(255,255,255,0.08);
      color: var(--text-sub);
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      animation: none !important;
    }

    /* ===== 「要件定義書を生成する」ボタン：初期は非表示でスライドアップ演出 ===== */
    #generate-btn {
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none; /* 非表示中はクリック不可 */
    }

    /* JS で付与するクラス：スライドアップして出現する */
    #generate-btn.slide-up {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* 非活性時は slide-up の transform を上書きする */
    #generate-btn.slide-up:disabled {
      transform: none !important;
    }

    /* ===== リップルエフェクト（波紋）===== */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      width: 10px;
      height: 10px;
      margin-left: -5px;  /* クリック座標を中心にするための補正 */
      margin-top:  -5px;
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to { transform: scale(28); opacity: 0; }
    }

    /* ===== 音声入力ボタン ===== */
    #voice-btn {
      background: rgba(0,212,255,0.07);
      border: 1px solid rgba(0,212,255,0.22);
      color: var(--cyan);
    }

    /* 録音中：赤いパルスアニメーション */
    #voice-btn.recording {
      background: rgba(229,62,62,0.12);
      border-color: rgba(229,62,62,0.45);
      color: #fc8181;
      animation: recordPulse 1s ease-in-out infinite;
    }

    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(229,62,62,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(229,62,62,0);   }
    }

    /* ===== 音声ステータステキスト ===== */
    #voice-status { font-size: 13px; color: var(--text-sub); }

    /* ===== ドットウェーブローディング（スピナー代替）===== */
    #loading-area, #question-loading-area {
      display: none;
      text-align: center;
      padding: 32px 0;
      color: var(--text-sub);
      font-size: 14px;
    }

    /* 5つのドットが波打つコンテナ */
    .dot-wave {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }

    /* 各ドット：グラデーションで塗って波打ちアニメーションをずらす */
    .dot-wave span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--grad);
      animation: dotWave 1.4s ease-in-out infinite;
    }

    .dot-wave span:nth-child(1) { animation-delay: 0s;    }
    .dot-wave span:nth-child(2) { animation-delay: 0.18s; }
    .dot-wave span:nth-child(3) { animation-delay: 0.36s; }
    .dot-wave span:nth-child(4) { animation-delay: 0.54s; }
    .dot-wave span:nth-child(5) { animation-delay: 0.72s; }

    @keyframes dotWave {
      0%, 60%, 100% { transform: translateY(0)    scale(0.8); opacity: 0.35; }
      30%            { transform: translateY(-12px) scale(1.1); opacity: 1;    }
    }

    /* ===== エラーエリア ===== */
    #error-area, #question-error-area {
      display: none;
      background: rgba(229,62,62,0.08);
      border: 1px solid rgba(229,62,62,0.25);
      border-radius: 10px;
      padding: 16px;
      color: #fc8181;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== 質問カードのコンテナ ===== */
    #question-content { margin-bottom: 4px; }

    /* ===== 質問個別アイテム（staggered アニメーション）===== */
    .question-item {
      position: relative;              /* ::before グラデーションバーの基準 */
      background: rgba(0,212,255,0.04);
      border: 1px solid rgba(0,212,255,0.10);
      border-radius: 12px;
      padding: 15px 18px 15px 22px;   /* 左にグラデーションバー分の余白 */
      margin-bottom: 10px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      /* 初期状態：上から降りてくるフェードイン前 */
      opacity: 0;
      transform: translateY(-14px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    /* JS の setTimeout で付与するクラス：スライドインして表示される */
    .question-item.slide-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* 左端のグラデーションラインバー */
    .question-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: var(--grad);
      border-radius: 3px;
    }

    /* 番号バッジ（グラデーション円形）*/
    .question-number {
      min-width: 26px;
      height: 26px;
      background: var(--grad);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: white;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* 質問本文 */
    .question-text {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
    }

    /* ===== 回答セクションの小ラベル ===== */
    .answer-section-label {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin: 24px 0 10px;
    }

    /* ===== セクション間のグラデーション区切りライン ===== */
    .gradient-divider {
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(0,212,255,0.22) 30%,
        rgba(0,102,255,0.22) 70%,
        transparent
      );
      margin: 0 0 28px;
    }

    /* ===== 出力エリアのヘッダー ===== */
    #output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ===== コピーボタン ===== */
    #copy-btn {
      background: rgba(0,212,255,0.08);
      color: var(--cyan);
      border: 1px solid rgba(0,212,255,0.22);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #copy-btn:hover  { background: rgba(0,212,255,0.16); }
    #copy-btn.copied { background: rgba(0,212,255,0.25); color: #7fffd4; }

    /* ===== 編集ボタン ===== */
    #edit-btn {
      background: rgba(148,163,184,0.07);
      color: var(--text-sub);
      border: 1px solid rgba(148,163,184,0.16);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    #edit-btn:hover { background: rgba(148,163,184,0.15); color: var(--text); }

    /* ===== 編集完了ボタン ===== */
    #edit-done-btn {
      background: rgba(0,212,255,0.08);
      color: var(--cyan);
      border: 1px solid rgba(0,212,255,0.22);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #edit-done-btn:hover { background: rgba(0,212,255,0.16); }

    /* ===== 出力コンテンツのMarkdownスタイル ===== */
    #output-content {
      line-height: 1.9;
      font-size: 15px;
      color: var(--text);
    }

    /* 見出し1（# ）→ <h2>：グラデーションテキスト ===== */
    #output-content h2 {
      font-size: 18px;
      font-weight: bold;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* 見出し2（## ）→ <h3> */
    #output-content h3 {
      font-size: 15px;
      font-weight: bold;
      color: rgba(0,212,255,0.85);
      margin: 18px 0 8px;
    }

    /* 見出し3（### ）→ <h4> */
    #output-content h4 {
      font-size: 14px;
      font-weight: bold;
      color: var(--text-sub);
      margin: 12px 0 6px;
    }

    #output-content ul, #output-content ol {
      padding-left: 24px;
      margin: 8px 0;
    }

    #output-content li       { margin-bottom: 6px; line-height: 1.75; }
    #output-content strong   { color: #a0cfff; font-weight: bold; }

    #output-content hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    #output-content p { margin: 8px 0; }

    /* 編集中のスタイル */
    #output-content[contenteditable="true"] {
      border: 1px dashed rgba(0,212,255,0.35);
      border-radius: 10px;
      padding: 16px;
      outline: none;
      cursor: text;
    }

    /* ===== スクロールフェードイン（IntersectionObserver）===== */
    .scroll-fade {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .scroll-fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== フッター ===== */
    footer {
      text-align: center;
      padding: 36px;
      color: rgba(148,163,184,0.3);
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- ===== ヘッダー：タイトルとAPIキー入力 ===== -->
  <header>
    <h1>🏗 AI要件定義システム</h1>
    <span id="api-key-label">Claude APIキー：</span>
    <!-- APIキー入力欄（type="password"で非表示、autocomplete="off"でパスワード保存ダイアログを抑制）-->
    <input
      type="password"
      id="api-key-input"
      placeholder="sk-ant-api03-..."
      title="Claude APIキーを入力してください"
      autocomplete="off"
    >
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main>

    <!-- ===== STEP 1：初回要望入力カード ===== -->
    <div class="card" id="input-card">
      <div class="section-title">📝 現場の状況・要望を入力</div>

      <!-- テキスト入力エリア（プレースホルダーはJSでタイピングアニメーション）-->
      <textarea id="input-textarea" placeholder=""></textarea>
      <div id="char-count">0 文字</div>

      <!-- 音声入力エリア（Web Speech API非対応ブラウザでは非表示）-->
      <div id="voice-area" style="margin-top:14px; display:flex; gap:12px; align-items:center;">
        <button class="btn" id="voice-btn" title="ボタンを押している間、音声を録音します">
          🎤 音声入力（押している間）
        </button>
        <span id="voice-status"></span>
      </div>

      <!-- ヒアリング開始ボタン（クリックするとAIが確認質問を生成する）-->
      <button class="btn" id="hearing-btn">
        💬 ヒアリングを開始する
      </button>

      <!-- STEP 1 のローディング（ドットウェーブ）-->
      <div id="loading-area">
        <div class="dot-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div id="loading-message">Claude AIが確認事項を考えています...</div>
      </div>

      <!-- STEP 1 のエラー表示 -->
      <div id="error-area"></div>
    </div>

    <!-- ===== STEP 2：深掘りヒアリングカード（STEP 1 完了後に表示）===== -->
    <div class="card scroll-fade" id="question-card" style="display:none;">
      <div class="section-title">💬 AIからの確認事項</div>

      <!-- AIが生成した質問を個別カードとして動的生成するコンテナ -->
      <div id="question-content"></div>

      <!-- 回答入力セクション -->
      <div class="answer-section-label">📝 上記の質問にご回答ください（番号順に）</div>
      <textarea
        id="answer-textarea"
        placeholder="例：&#10;1. 現在は紙の日報で管理しています。毎日10〜20枚ほど処理しています。&#10;2. 現場作業員15名と所長2名が使います。本社管理者3名が確認します。&#10;3. ..."
      ></textarea>
      <div id="answer-char-count">0 文字</div>

      <!-- 要件定義書生成ボタン（回答入力後にスライドアップで出現）-->
      <button class="btn" id="generate-btn">
        ✨ 要件定義書を生成する
      </button>

      <!-- STEP 2 のローディング（ドットウェーブ）-->
      <div id="question-loading-area">
        <div class="dot-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div>Claude AIが要件定義書を生成しています...</div>
      </div>

      <!-- STEP 2 のエラー表示 -->
      <div id="question-error-area"></div>
    </div>

    <!-- ===== STEP 3：生成結果表示エリア ===== -->
    <div class="card scroll-fade" id="output-card" style="display:none;">
      <!-- 出力ヘッダー（タイトル＋編集・コピーボタン）-->
      <div id="output-header">
        <div class="section-title" style="margin-bottom:0; border-bottom:none; padding-bottom:0;">
          📄 生成された要件定義書
        </div>
        <!-- ボタングループ -->
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <!-- 編集ボタン：生成後に表示 -->

  <script>
    // ===== DOMが読み込まれた後に初期化処理を実行する =====
    document.addEventListener('DOMContentLoaded', function() {

      // ===== 要素参照の取得 =====
      var apiKeyInput     = document.getElementById('api-key-input');
      var textarea        = document.getElementById('input-textarea');
      var charCount       = document.getElementById('char-count');
      var hearingBtn      = document.getElementById('hearing-btn');
      var answerTextarea  = document.getElementById('answer-textarea');
      var answerCharCount = document.getElementById('answer-char-count');
      var generateBtn     = document.getElementById('generate-btn');

      // ===== APIキーの localStorage 復元・保存 =====

      if (savedKey) apiKeyInput.value = savedKey;
      apiKeyInput.addEventListener('input', function() {
        localStorage.setItem('claude_api_key', apiKeyInput.value);
      });

      // ===== プロキシサーバーのエンドポイント =====
      var API_URL = 'http://localhost:3001/api/claude';

      // ===== STEP 1/2 の取得情報を保持する変数 =====
      var savedInitialRequest     = '';
      var savedQuestionsText      = '';
      var originalHearingBtnText  = hearingBtn.textContent.trim();
      var originalGenerateBtnText = generateBtn.textContent.trim();

      // ============================================================
      // ① タイピングアニメーション（プレースホルダーを順番に表示）
      // ============================================================
      var placeholderTexts = [
        '現場の進捗管理をもっと楽にしたい。今は紙の日報を使っているが、スマホで写真を撮って報告できるようにしたい。',
        '図面の最新版管理が大変。現場と事務所で別々のバージョンを持ってしまい、認識のズレが起きている。',
        '安全パトロールの記録をデジタル化したい。今は手書きで記録しているが、集計に時間がかかっている。',
        '工事の工程表をリアルタイムで共有したい。今はExcelで管理していて、更新のたびにメールで送っている。',
      ];
      var phIdx     = 0;      // 現在表示中のサンプルインデックス
      var phChar    = 0;      // 現在何文字目まで表示しているか
      var phTimer   = null;   // setTimeout の ID（クリアに使う）
      var phErasing = false;  // 消去中かどうか

      // 1文字ずつ表示するタイピング処理
      function typePlaceholder() {
        var target = placeholderTexts[phIdx];
        if (!phErasing) {
          // タイピング：1文字ずつ追加する
          phChar++;
          textarea.placeholder = target.slice(0, phChar) + '|'; // カーソル記号を末尾に付ける
          if (phChar >= target.length) {
            // 全文表示したら2.5秒待って消去フェーズへ
            phTimer = setTimeout(function() { phErasing = true; typePlaceholder(); }, 2500);
          } else {
            phTimer = setTimeout(typePlaceholder, 55); // 1文字あたり55ms
          }
        } else {
          // 消去：1文字ずつ削除する
          phChar--;
          textarea.placeholder = target.slice(0, phChar) + (phChar > 0 ? '|' : '');
          if (phChar <= 0) {
            // 全消去したら次のサンプルへ
            phErasing = false;
            phIdx     = (phIdx + 1) % placeholderTexts.length;
            phTimer   = setTimeout(typePlaceholder, 400); // 次の文の前に少し間を置く
          } else {
            phTimer = setTimeout(typePlaceholder, 30); // 消去はタイピングより少し速め
          }
        }
      }

      // ユーザーがフォーカスしたらアニメーションを止めてプレースホルダーをクリアする
      textarea.addEventListener('focus', function() {
        clearTimeout(phTimer);
        textarea.placeholder = '';
      });
      // フォーカスが外れて入力がなければアニメーションを再開する
      textarea.addEventListener('blur', function() {
        if (!textarea.value) {
          phChar = 0; phErasing = false;
          phTimer = setTimeout(typePlaceholder, 600);
        }
      });

      // ページロード後に少し遅らせてアニメーション開始する
      phTimer = setTimeout(typePlaceholder, 1000);

      // ============================================================
      // ② 文字数カウンター（バウンスアニメーション付き）
      // ============================================================
      // 文字数表示＋バウンスアニメーションを実行するヘルパー関数
      function updateCharCount(el, count) {
        el.textContent = count + ' 文字';
        el.classList.add('count-bump');                              // バウンスクラスを付与する
        setTimeout(function() { el.classList.remove('count-bump'); }, 200); // 200ms後に解除する
      }

      textarea.addEventListener('input', function() {
        updateCharCount(charCount, textarea.value.length);
      });

      answerTextarea.addEventListener('input', function() {
        updateCharCount(answerCharCount, answerTextarea.value.length);

          generateBtn.classList.add('slide-up');

      });

      // ============================================================
      // ③ リップルエフェクト（ボタン押下時の波紋）
      // ============================================================
      function addRipple(btn, clientX, clientY) {
        var rect   = btn.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.classList.add('ripple');
        ripple.style.left = (clientX - rect.left) + 'px';
        ripple.style.top  = (clientY - rect.top)  + 'px';
        btn.appendChild(ripple);
        // アニメーション終了後（560ms）に要素を削除する
        setTimeout(function() { ripple.remove(); }, 600);
      }

      // リップルを適用するボタンにイベントを登録する
      [hearingBtn, generateBtn].forEach(function(btn) {
        btn.addEventListener('mousedown', function(e) {
          addRipple(btn, e.clientX, e.clientY);
        });
        btn.addEventListener('touchstart', function(e) {
          if (e.touches[0]) addRipple(btn, e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
      });

      // ============================================================
      // ④ IntersectionObserver（スクロール時フェードイン）
      // ============================================================
      var scrollObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');   // フェードインを開始する
            scrollObserver.unobserve(entry.target);  // 一度表示したら監視を解除する
          }
        });
      }, { threshold: 0.1 });

      // .scroll-fade クラスを持つ要素を監視対象に登録する
      document.querySelectorAll('.scroll-fade').forEach(function(el) {
        scrollObserver.observe(el);
      });

      // ============================================================
      // ⑤ Claude API 共通呼び出し関数
      // ============================================================
      async function callClaudeApi(apiKey, systemPrompt, userMessage) {
        var requestBody = {
          model:      'claude-sonnet-4-20250514', // 使用するモデル
          max_tokens: 4000,                        // 最大生成トークン数
          system:     systemPrompt,                // システムプロンプト
          messages:   [{ role: 'user', content: userMessage }]
        };

        var response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json', // JSONを送ることを宣言
            'x-api-key':    apiKey              // APIキーをプロキシへ転送
          },
          body: JSON.stringify(requestBody)
        });

        // HTTPエラー（4xx/5xx）を日本語メッセージに変換する
        if (!response.ok) {
          var errorMsg = 'APIエラー（HTTP ' + response.status + '）\n';
          if (response.status === 401) {
            errorMsg += 'APIキーが無効です。正しいAPIキーを入力してください。';
          } else if (response.status === 429) {
            errorMsg += 'APIの利用制限に達しました。しばらく待ってから再試行してください。';
          } else if (response.status === 400) {
            errorMsg += 'リクエストの形式が不正です。入力内容を確認してください。';
          } else {
            try {
              var errorData = await response.json();
              errorMsg += (errorData.error && errorData.error.message)
                ? errorData.error.message : '不明なエラー';
            } catch (_) {
              errorMsg += 'サーバーからのレスポンスを解析できませんでした。';
            }
          }
          throw new Error(errorMsg);
        }

        var data = await response.json();
        // レスポンス構造を安全に確認する
        if (!data.content || !data.content[0] || !data.content[0].text) {
          throw new Error('APIから有効なレスポンスが返りませんでした。もう一度お試しください。');
        }
        return data.content[0].text; // 返答テキストを返す
      }

      // ============================================================
      // ⑥ エラーメッセージ表示（XSSセーフなDOM操作）
      // ============================================================
      function showError(errorArea, message) {
        errorArea.style.display = 'block';
        errorArea.textContent   = '';
        errorArea.appendChild(document.createTextNode('⚠️ ')); // プレフィックスをテキストノードで追加
        message.split('\n').forEach(function(line, i) {
          if (i > 0) errorArea.appendChild(document.createElement('br')); // 改行を<br>で挿入
          errorArea.appendChild(document.createTextNode(line)); // 各行をテキストノードで追加（HTML注入不可）
        });
      }

          document.getElementById('output-card').scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
          // エラーを質問カード内のエラーエリアに表示する
          var displayMessage = error.message;
          if (error instanceof TypeError) {
            displayMessage = 'ネットワークエラー。server.js が起動しているか確認してください。\n（詳細：' + error.message + '）';
          }
          showError(qErrorArea, displayMessage);
        } finally {
          // ローディングを終了してボタンを元に戻す
          document.getElementById('question-loading-area').style.display = 'none';
          generateBtn.disabled    = false;
          generateBtn.textContent = originalGenerateBtnText;
        }
      });

      // ============================================================
      // ⑨ 音声入力機能（Web Speech API）
      // ============================================================
      var voiceBtn          = document.getElementById('voice-btn');
      var voiceStatus       = document.getElementById('voice-status');
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        // Web Speech API 非対応ブラウザ（Firefox等）では音声ボタンを非表示にする
        document.getElementById('voice-area').style.display = 'none';
      } else {
        var isRecording = false; // 多重起動防止フラグ
        var recognition = new SpeechRecognition();
        recognition.lang           = 'ja-JP';  // 日本語認識
        recognition.continuous     = true;      // ボタンを押している間ずっと認識する
        recognition.interimResults = true;      // 途中結果もリアルタイム表示する

        recognition.onresult = function(event) {
          var interimText = '', finalText = '';
          for (var i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              finalText   += event.results[i][0].transcript; // 確定した文字
            } else {
              interimText += event.results[i][0].transcript; // 途中の文字
            }
          }
          if (finalText) {
            textarea.value += finalText; // 確定した文字をテキストエリアに追記する
            updateCharCount(charCount, textarea.value.length);
          }
          if (interimText) voiceStatus.textContent = '認識中：' + interimText;
        };

        recognition.onerror = function(event) {
          if      (event.error === 'no-speech')   voiceStatus.textContent = '音声が検出されませんでした';
          else if (event.error === 'not-allowed') voiceStatus.textContent = 'マイクの使用が許可されていません';
          else                                    voiceStatus.textContent = 'エラー：' + event.error;
        };

        recognition.onend = function() {
          isRecording = false;
          voiceBtn.classList.remove('recording');
          voiceBtn.textContent = '🎤 音声入力（押している間）';
          if (!voiceStatus.textContent.startsWith('エラー') &&
              !voiceStatus.textContent.startsWith('マイク') &&
              !voiceStatus.textContent.startsWith('音声が')) {
            voiceStatus.textContent = '録音完了';
          }
        };

        // マウスを押している間だけ録音する
        voiceBtn.addEventListener('mousedown', function() {
          if (isRecording) return;
          isRecording = true;
          voiceStatus.textContent = '録音中...';
          voiceBtn.classList.add('recording');
          voiceBtn.textContent    = '🔴 録音中（離したら停止）';
          recognition.start();
        });
        voiceBtn.addEventListener('mouseup',    function() { recognition.stop(); });
        voiceBtn.addEventListener('mouseleave', function() { recognition.stop(); });

        // タッチ操作（スマホ・タブレット対応）
        voiceBtn.addEventListener('touchstart', function(e) {
          e.preventDefault();
          if (isRecording) return;
          isRecording = true;
          voiceStatus.textContent = '録音中...';
          voiceBtn.classList.add('recording');
          voiceBtn.textContent    = '🔴 録音中（離したら停止）';
          recognition.start();
        });
        voiceBtn.addEventListener('touchend',    function() { recognition.stop(); });
        voiceBtn.addEventListener('touchcancel', function() { recognition.stop(); }); // 電話着信等による中断対応
      }

      // ============================================================
      // ⑩ コピーボタン
      // ============================================================
      var copyBtn = document.getElementById('copy-btn');

      if (copyBtn) {
        var copyResetTimer = null; // 連続クリック時のタイマー重複防止

        copyBtn.addEventListener('click', function() {
          var textToCopy = window.generatedMarkdown;
          if (!textToCopy) return;

          // 前回のタイマーが残っていればキャンセルする（連続クリック対策）
          if (copyResetTimer) { clearTimeout(copyResetTimer); copyResetTimer = null; }

          if (navigator.clipboard && window.isSecureContext) {
            // クリップボードAPIが使える場合（推奨）
            navigator.clipboard.writeText(textToCopy).then(showCopySuccess).catch(function() {
              fallbackCopy(textToCopy);
            });
          } else {
            fallbackCopy(textToCopy); // HTTP環境などでのフォールバック
          }
        });

        // コピー成功時のフィードバック表示
        function showCopySuccess() {
          copyBtn.textContent = '✅ コピーしました！';
          copyBtn.classList.add('copied');
          copyResetTimer = setTimeout(function() {
            copyBtn.textContent = '📋 Markdownをコピー';
            copyBtn.classList.remove('copied');
            copyResetTimer = null;
          }, 2000);
        }

        // クリップボードAPIが使えない環境向けのフォールバック
        function fallbackCopy(text) {
          var tmp = document.createElement('textarea');
          tmp.value          = text;
          tmp.style.position = 'fixed';
          tmp.style.left     = '-9999px';
          tmp.style.top      = '-9999px';
          document.body.appendChild(tmp);
          tmp.focus();
          tmp.select();
          var ok = document.execCommand('copy');
          document.body.removeChild(tmp);
          if (ok) showCopySuccess();
          else    alert('コピーに失敗しました。手動でCtrl+Cでコピーしてください。');
        }
      }

      // ============================================================
      // ⑪ 編集ボタン
      // ============================================================
      var editBtn          = document.getElementById('edit-btn');
      var editDoneBtn      = document.getElementById('edit-done-btn');
      var outputEditTarget = document.getElementById('output-content');

      // 「編集する」ボタンのクリック：contenteditable を有効にして直接編集可能にする
      editBtn.addEventListener('click', function() {
        outputEditTarget.contentEditable = 'true';
        outputEditTarget.focus();
        editBtn.style.display     = 'none';
        editDoneBtn.style.display = 'inline-block';
      });

      // 「編集を完了する」ボタンのクリック：閲覧モードに戻す（編集内容はHTMLとして保持）
      editDoneBtn.addEventListener('click', function() {
        outputEditTarget.removeAttribute('contenteditable');
        editDoneBtn.style.display = 'none';
        editBtn.style.display     = 'inline-block';
      });

    }); // DOMContentLoaded end

    // ============================================================
    // Markdownレンダリング関数（DOMContentLoaded外に置いてグローバルに使用）
    // ============================================================
    // Markdown → HTML 変換ルール（優先度順）：
    //   # text  → <h2>（セクション大見出し）
    //   ## text → <h3>（サブ見出し）
    //   ### text→ <h4>（小見出し）
    //   1. text → <ol><li>（番号付きリスト）
    //   - text  → <ul><li>（箇条書きリスト）
    //   ---     → <hr>（区切り線）
    //   **text**→ <strong>（太字インライン）
    //   空行    → リストを閉じる区切り
    //   その他  → <p>（通常段落）
    function renderMarkdown(markdownText) {
      var outputContent = document.getElementById('output-content');
      var lines         = markdownText.split('\n');
      var htmlLines     = [];
      var inList        = false; // <ul> が開いているか
      var inOrderedList = false; // <ol> が開いているか

      // 開いているリストタグをすべて閉じる共通処理
      function closeOpenLists() {
        if (inList)        { htmlLines.push('</ul>'); inList = false; }
        if (inOrderedList) { htmlLines.push('</ol>'); inOrderedList = false; }
      }

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        // 長いプレフィックスから先にチェックすることで誤判定を防ぐ
        if (line.startsWith('### ')) {
          closeOpenLists();
          htmlLines.push('<h4>' + escapeHtml(line.slice(4)) + '</h4>');
        } else if (line.startsWith('## ')) {
          closeOpenLists();
          htmlLines.push('<h3>' + escapeHtml(line.slice(3)) + '</h3>');
        } else if (line.startsWith('# ')) {
          closeOpenLists();
          htmlLines.push('<h2>' + escapeHtml(line.slice(2)) + '</h2>');
        } else if (/^\d+\. /.test(line)) {
          // 番号付きリスト
          if (inList) { htmlLines.push('</ul>'); inList = false; }
          if (!inOrderedList) { htmlLines.push('<ol>'); inOrderedList = true; }
          htmlLines.push('<li>' + applyInlineMarkdown(escapeHtml(line.replace(/^\d+\. /, ''))) + '</li>');
        } else if (line.startsWith('- ') || line.startsWith('* ')) {
          // 箇条書きリスト
          if (inOrderedList) { htmlLines.push('</ol>'); inOrderedList = false; }
          if (!inList) { htmlLines.push('<ul>'); inList = true; }
          htmlLines.push('<li>' + applyInlineMarkdown(escapeHtml(line.slice(2))) + '</li>');
        } else if (line.trim() === '---') {
          closeOpenLists();
          htmlLines.push('<hr>');
        } else if (line.trim() === '') {
          closeOpenLists();
          htmlLines.push('');
        } else {
          closeOpenLists();
          htmlLines.push('<p>' + applyInlineMarkdown(escapeHtml(line)) + '</p>');
        }
      }

      closeOpenLists(); // 末尾で開いたままのリストを閉じる
      outputContent.innerHTML = htmlLines.join('\n');
    }

    // **太字** を <strong> に変換するインラインMarkdownヘルパー
    function applyInlineMarkdown(text) {
      return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    // HTMLの特殊文字をエスケープする関数（XSS対策：必ず escapeHtml を先に通す）
    function escapeHtml(text) {
      return text
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#039;');
    }
  </script>
